function applyTransform(){
  cv.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
  document.getElementById('zoom-info').textContent=`${Math.round(zoom*100)}% · ${V.length} venues`;
}

const mapArea=document.getElementById('map-area');
mapArea.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=mapArea.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const oldZ=zoom;
  zoom=Math.max(0.5,Math.min(4,zoom*(e.deltaY<0?1.15:0.87)));
  panX=mx-(mx-panX)*(zoom/oldZ);
  panY=my-(my-panY)*(zoom/oldZ);
  applyTransform();
},{passive:false});

mapArea.addEventListener('mousedown',e=>{if(e.button===0){dragging=true;dragStartX=e.clientX-panX;dragStartY=e.clientY-panY;e.preventDefault()}});
window.addEventListener('mousemove',e=>{if(dragging){panX=e.clientX-dragStartX;panY=e.clientY-dragStartY;applyTransform()}});
window.addEventListener('mouseup',()=>{dragging=false});

function panTo(tx,ty){
  const rect=mapArea.getBoundingClientRect();
  const targetZ=2;
  zoom=targetZ;
  panX=rect.width/2-tx*zoom;
  panY=rect.height/2-ty*zoom;
  applyTransform();
}

function resetView(){zoom=1;panX=0;panY=0;applyTransform()}

function drawTile(r,c,t){
  const x=c*TS,y=r*TS,z=getZone(r,c);
  cx.fillStyle=tCol(r,c,t);cx.fillRect(x,y,TS,TS);

  if(t===T.B){
    const roofs=(nit?RPAL_N:RPAL_D)[z];
    cx.fillStyle=roofs[H(r,c)%roofs.length];cx.fillRect(x+1,y+1,TS-2,4);

      cx.fillStyle=nit?'rgba(100,180,255,.5)':'rgba(160,210,255,.5)';
      cx.fillRect(x+2,y+6,5,3);cx.fillRect(x+9,y+6,5,3);cx.fillRect(x+2,y+10,5,3);cx.fillRect(x+9,y+10,5,3);
      if(H(r,c)%4===0){cx.fillStyle=nit?'#2a3a4a':'#8898a8';cx.fillRect(x+12,y,2,4)}
    }else if(z===0){
      const wn=i=>nit?((H(r*11,c*17+i)%7>2)?'rgba(255,190,50,.8)':'rgba(8,8,4,.85)'):'rgba(255,240,200,.3)';
      cx.fillStyle=wn(0);cx.fillRect(x+2,y+7,2,2);cx.fillStyle=wn(1);cx.fillRect(x+7,y+7,2,2);cx.fillStyle=wn(2);cx.fillRect(x+12,y+7,2,2);
      cx.fillStyle=nit?'#1a0c04':'#5a2a10';cx.fillRect(x+6,y+11,4,5);
    }else{
      const wn=i=>nit?((H(r*13,c*19+i)%8>2)?'rgba(255,210,70,.95)':'rgba(6,10,20,.9)'):'rgba(200,230,255,.35)';
      cx.fillStyle=wn(0);cx.fillRect(x+2,y+6,3,3);cx.fillStyle=wn(1);cx.fillRect(x+9,y+6,3,3);
      cx.fillStyle=wn(2);cx.fillRect(x+2,y+11,3,3);cx.fillStyle=wn(3);cx.fillRect(x+9,y+11,3,3);
      cx.fillStyle=nit?'#1a1008':'#6a3a28';cx.fillRect(x+6,y+11,4,5);
    }
    if(H(r,c+2)%5===0){cx.fillStyle=nit?'#1a1a1a':'#888';cx.fillRect(x+2,y-1,4,3)}
    if(z===3&&H(r,c+3)%6===0&&!nit){cx.fillStyle='rgba(60,40,20,.25)';cx.fillRect(x,y-1,TS,1);cx.fillStyle='#cc6666';cx.fillRect(x+3,y-1,2,2);cx.fillStyle='#6666cc';cx.fillRect(x+8,y-1,2,2)}
  }

  if(t===T.P){
    const tt=getTreeType(r,c);
    if(tt==='banyan'&&H(r,c)%3===0){
      cx.fillStyle=nit?'#1a1008':'#5a3818';cx.fillRect(x+7,y+8,2,8);
      cx.fillStyle=nit?'#120c04':'#7a5030';cx.fillRect(x+3,y+6,1,5);cx.fillRect(x+12,y+5,1,6);
      cx.fillStyle=nit?'#0a2206':'#1a5a10';cx.fillRect(x-1,y+1,TS+2,8);
      cx.fillStyle=nit?'#0c2a08':'#2a7018';cx.fillRect(x+1,y+0,TS-2,6);
      cx.fillStyle=nit?'#0e3010':'#3a8028';cx.fillRect(x+3,y-1,10,4);
    }else if(tt==='palm'&&H(r,c)%3!==2){
      cx.fillStyle=nit?'#1a1408':'#8a6830';cx.fillRect(x+7,y+4,2,12);
      cx.fillStyle=nit?'#0c2a08':'#2a8018';cx.fillRect(x+2,y+1,5,3);cx.fillRect(x+9,y+1,5,3);
      cx.fillStyle=nit?'#0e3410':'#3a9028';cx.fillRect(x+5,y+0,6,3);
    }else if(tt==='gulmohar'&&H(r,c)%3!==1){
      cx.fillStyle=nit?'#1a1008':'#6a4020';cx.fillRect(x+7,y+10,2,6);
      cx.fillStyle=nit?'#0a2006':'#2a6818';cx.fillRect(x+3,y+3,10,8);
      cx.fillStyle=nit?'#3a1008':'#e04820';cx.fillRect(x+4,y+2,3,3);cx.fillRect(x+9,y+2,3,3);

    }else{cx.fillStyle=nit?'#0a2408':'#2a6018';cx.fillRect(x+2,y+8,5,5);cx.fillRect(x+3,y+6,3,3)}
    if((r+c)%5===0){cx.fillStyle=nit?'#182a10':'#b0a070';cx.fillRect(x,y+14,TS,2)}
  }

  if(t===T.W){
    if((c+Math.floor(fr/12))%5<2){cx.fillStyle=nit?'#041830':'#3070b0';cx.fillRect(x+1,y+5,TS-2,2);cx.fillRect(x+4,y+11,TS-8,2)}

    if(H(r*3,c*7)%12===0){cx.fillStyle=nit?'#0a3008':'#3a9028';cx.fillRect(x+4,y+6,4,3);cx.fillStyle=nit?'#3a1028':'#ff6688';cx.fillRect(x+5,y+5,2,2)}
  }

  if(t===T.M){
    const awC=nit?['#280800','#0a1020','#200a00']:['#e06020','#2080d0','#d04010','#20a060'];
    cx.fillStyle=awC[H(r,c)%awC.length];cx.fillRect(x,y,TS,5);

      cx.fillStyle=nit?'rgba(255,200,150,.5)':['#ffccaa','#c89060','#ffd8b0'][H(r,c)%3];
      cx.fillRect(px,py,2,2);cx.fillStyle='#2a1a0a';cx.fillRect(px,py-1,2,1);
      cx.fillStyle=nit?'rgba(100,140,200,.5)':['#4488cc','#cc4488','#88cc44','#dd8844'][H(r,c)%4];

    }

  if(t===T.G){if(H(r,c)%5===0){cx.fillStyle=nit?'#3a2060':'#ff88cc';cx.fillRect(x+H(r,c)%12,y+H(r,c+1)%12,2,2)}if(H(r+1,c+1)%4===0){cx.fillStyle=nit?'#2a4020':'#60a040';cx.fillRect(x+3,y+5,3,6)}}

}

const DOGS=[];for(let i=0;i<18;i++){const dr=H(i*7,i*3)%RO,dc=H(i*3,i*7)%CO;if(dc<48)DOGS.push({r:dr,c:dc,f:H(i,i)%2})}
function drawDogs(){DOGS.forEach(d=>{if(MAP[d.r][d.c]!==T.R&&MAP[d.r][d.c]!==T.G)return;const adj=d.r>0?MAP[d.r-1][d.c]:T.R;if(adj!==T.B)return;const x=d.c*TS+(d.f?2:6),y=d.r*TS+10;cx.fillStyle=nit?'rgba(140,100,60,.4)':'#8a6a40';cx.fillRect(x,y,5,3);cx.fillStyle=nit?'rgba(120,80,40,.4)':'#7a5a30';cx.fillRect(x+(d.f?5:-2),y-1,3,3)})}

function drawBirds(){[{y:1,sp:.6,sz:5,o:0},{y:0,sp:.4,sz:4,o:200},{y:2,sp:.8,sz:3,o:400}].forEach(f=>{const bx=((fr*f.sp+f.o)%(CO*TS+200))-100;cx.fillStyle=nit?'rgba(200,200,200,.35)':'rgba(40,30,20,.45)';for(let b=0;b<f.sz;b++){const x2=bx-b*6,y2=f.y*TS+4+b*2+Math.sin(fr*.15+b)*1.5;cx.fillRect(x2-1,y2,1,1);cx.fillRect(x2,y2-1,1,1);cx.fillRect(x2+1,y2,1,1)}for(let b=1;b<f.sz;b++){const x2=bx+b*6,y2=f.y*TS+4+b*2+Math.sin(fr*.15+b)*1.5;cx.fillRect(x2-1,y2,1,1);cx.fillRect(x2,y2-1,1,1);cx.fillRect(x2+1,y2,1,1)}})}

const DROPS=[];for(let i=0;i<120;i++)DROPS.push({x:Math.random()*CO*TS,y:Math.random()*RO*TS,sp:2+Math.random()*3,ln:2+Math.random()*3});
function drawRain(){if(!rain)return;cx.fillStyle='rgba(10,15,25,.12)';cx.fillRect(0,0,cv.width,cv.height);cx.strokeStyle=nit?'rgba(100,140,200,.3)':'rgba(140,180,220,.35)';cx.lineWidth=1;DROPS.forEach(d=>{d.y+=d.sp;d.x+=.5;if(d.y>RO*TS){d.y=-10;d.x=Math.random()*CO*TS}cx.beginPath();cx.moveTo(d.x,d.y);cx.lineTo(d.x+.5,d.y+d.ln);cx.stroke()});for(let r=0;r<RO;r++)for(let c=0;c<CO;c++)if(MAP[r][c]===T.R&&H(r,c)%10===0){cx.fillStyle=nit?'rgba(60,100,160,.15)':'rgba(120,170,220,.2)';cx.fillRect(c*TS+2,r*TS+10,8,3)}}

// ═══ PHASE 3: METRO, LANDMARKS, TRAFFIC ═══
function drawMetro(){
  cx.fillStyle=nit?'rgba(130,80,200,.5)':'rgba(130,80,200,.6)';cx.fillRect(2*TS,16*TS+7,38*TS,2);
  const tpx=((fr*1.2)%(40*TS));cx.fillStyle=nit?'#6040a0':'#8060c0';cx.fillRect(tpx,16*TS+4,12,5);
  cx.fillStyle=nit?'rgba(255,255,200,.5)':'rgba(255,255,200,.7)';cx.fillRect(tpx,16*TS+5,2,2);

  cx.fillStyle=nit?'rgba(60,180,80,.5)':'rgba(60,180,80,.6)';cx.fillRect(12*TS+7,2*TS,2,31*TS);
  const tgy=((fr*1.0)%(32*TS));cx.fillStyle=nit?'#208040':'#30a050';cx.fillRect(12*TS+4,tgy,5,12);

  cx.fillStyle=nit?'rgba(255,200,60,.6)':'rgba(255,200,60,.8)';cx.fillRect(12*TS+3,16*TS+3,10,10);
  cx.fillStyle=nit?'#ffe8a0':'#fff';cx.font='4px monospace';cx.fillText('M',12*TS+5,16*TS+10);
}

function drawLandmarks(){
  // Vidhana Soudha
  let vx=14*TS,vy=15*TS;
  cx.fillStyle=nit?'#1a1808':'#d0c0a0';cx.fillRect(vx-2,vy+4,TS+4,12);
  cx.fillStyle=nit?'#2a2008':'#c8a868';cx.fillRect(vx+2,vy+1,TS-4,4);cx.fillRect(vx+4,vy-1,TS-8,3);cx.fillRect(vx+6,vy-2,4,2);
  cx.fillStyle='#ff6633';cx.fillRect(vx+7,vy-4,1,3);cx.fillStyle='#fff';cx.fillRect(vx+7,vy-3,1,1);cx.fillStyle='#138808';cx.fillRect(vx+7,vy-2,1,1);

  // Bangalore Palace
  let bx=20*TS,by=6*TS;
  cx.fillStyle=nit?'#1a1010':'#c88080';cx.fillRect(bx+1,by+4,14,12);
  cx.fillStyle=nit?'#2a1818':'#d09090';cx.fillRect(bx,by+2,4,6);cx.fillRect(bx+12,by+2,4,6);
  cx.fillRect(bx,by+1,2,2);cx.fillRect(bx+2,by,2,2);cx.fillRect(bx+12,by+1,2,2);cx.fillRect(bx+14,by,2,2);
}

function drawTrafficSignals(){
  [[16,19],[16,26],[16,33],[9,19],[22,19],[22,26],[27,12]].forEach(([r,c])=>{
    const sx=c*TS+TS-3,sy=r*TS+1;cx.fillStyle=nit?'#1a1a1a':'#333';cx.fillRect(sx-1,sy,4,8);
    const ph=Math.floor((fr+c*20+r*30)/60)%3;
    cx.fillStyle=ph===0||(r===22&&c===19)?(nit?'#ff3030':'#ff2020'):(nit?'#3a0000':'#660000');cx.fillRect(sx,sy+1,2,2);
    cx.fillStyle=ph===1&&!(r===22&&c===19)?(nit?'#ffcc00':'#ddaa00'):(nit?'#2a2000':'#554400');cx.fillRect(sx,sy+3,2,2);
    cx.fillStyle=ph===2&&!(r===22&&c===19)?(nit?'#30ff30':'#20dd20'):(nit?'#003a00':'#005500');cx.fillRect(sx,sy+5,2,2);
  });
}

// ═══ PHASE 5: PARTICLES ═══
const particles=[];
function spawnParticles(){
  // Fireflies in parks at night
  if(nit&&fr%8===0){
    for(let r=11;r<=15;r+=2)for(let c=8;c<=18;c+=3){
      if(H(r+fr,c)%20===0)particles.push({x:c*TS+H(r,c)%TS,y:r*TS+H(c,r)%TS,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,life:80+Math.random()*40,type:'firefly'});
    }
  }
  // Music notes near concert venues
  if(fr%20===0){
    V.filter(v=>v.cat==='music'&&vis(v)).forEach(v=>{
      if(H(fr,v.id)%4===0)particles.push({x:v.c*TS+8,y:v.r*TS-4,vx:(Math.random()-.5)*.5,vy:-0.3-Math.random()*.3,life:50,type:'note',col:CC.music});
    });
  }
  // Steam from food venues
  if(fr%12===0){
    V.filter(v=>v.cat==='food'&&vis(v)).forEach(v=>{
      if(H(fr,v.id)%3===0)particles.push({x:v.c*TS+6+Math.random()*4,y:v.r*TS,vx:(Math.random()-.5)*.2,vy:-0.4,life:30,type:'steam'});
    });
  }
}

function drawParticles(){
  spawnParticles();
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.life<=0){particles.splice(i,1);continue}
    const a=Math.min(1,p.life/20);
    if(p.type==='firefly'){
      cx.fillStyle=`rgba(200,255,100,${a*.6+Math.sin(fr*.2+i)*.2})`;
      cx.fillRect(p.x,p.y,2,2);
    }else if(p.type==='note'){
      cx.fillStyle=p.col+Math.round(a*99).toString(16).padStart(2,'0');
      cx.font='6px serif';cx.fillText('♪',p.x,p.y);
    }else if(p.type==='steam'){
      cx.fillStyle=`rgba(200,200,200,${a*.2})`;
      cx.fillRect(p.x,p.y,2,1);
    }
  }
}

// ═══ PHASE 4: AUTO-GENERATED STREET VIEW ═══
function drawStreetView(v){
  const w=400,h=200,col=CC[v.cat]||'#fff';
  svCx.clearRect(0,0,w,h);
  svCx.fillStyle=nit?'#0a1424':'#88bbdd';svCx.fillRect(0,0,w,80);
  svCx.fillStyle=nit?'#1a1a10':'#c0a878';svCx.fillRect(0,80,w,120);
  svCx.fillStyle=nit?'#2a2218':'#9a8868';svCx.fillRect(0,100,w,40);
  svCx.fillStyle=nit?'rgba(255,220,60,.1)':'rgba(255,255,200,.3)';
  for(let x=10;x<w;x+=20)svCx.fillRect(x,118,10,2);
  svCx.fillStyle=nit?'#282818':'#d0c098';svCx.fillRect(0,80,w,20);svCx.fillRect(0,140,w,12);

  // Auto-generate buildings based on venue category
  const builds=v.ev.length+2;
  for(let i=0;i<builds;i++){
    const bx=i*(w/builds)+5,bw=w/builds-10,bh=30+i*8+(v.cat==='tech'?15:0);
    svCx.fillStyle=nit?'#1a1a2a':'tCol' in window?'#6080a0':
      v.cat==='food'?['#d08850','#50a080','#5080c0','#c0a050'][i%4]:
      v.cat==='tech'?['#607898','#788898','#6080a0'][i%3]:
      v.cat==='music'?['#6040a0','#a04060','#604080'][i%3]:
      ['#c07850','#d08868','#b86840'][i%3];
    svCx.fillRect(bx,80-bh,bw,bh);
    // Awning/sign colored by venue
    svCx.fillStyle=col+'88';svCx.fillRect(bx,80-bh-4,bw,4);
    // Windows
    for(let wy=4;wy<bh-10;wy+=10){
      for(let wx=3;wx<bw-6;wx+=8){
        svCx.fillStyle=nit?((H(wy,wx+i)%3>0)?'rgba(255,220,80,.7)':'rgba(10,15,30,.8)'):'rgba(180,220,255,.5)';
        svCx.fillRect(bx+wx,80-bh+wy,5,4);
      }
    }
    // Door
    svCx.fillStyle=nit?'rgba(255,200,60,.3)':'#5a3018';
    svCx.fillRect(bx+bw/2-4,80-10,8,10);
  }

  // Category-specific details
  if(v.cat==='food'){
    [60,160,280].forEach(tx=>{svCx.fillStyle=nit?'#1a1a10':'#fff8e0';svCx.fillRect(tx,148,10,4);svCx.fillStyle=nit?'#2a2a20':'#aa8860';svCx.fillRect(tx+3,152,4,6)});
  }
  if(v.cat==='music'){
    svCx.fillStyle=col+'44';svCx.font='8px serif';
    for(let n=0;n<5;n++)svCx.fillText('♪',50+n*70+Math.sin(fr*.1+n)*5,60+Math.cos(fr*.08+n)*8);
  }
  if(v.cat==='tech'){
    svCx.fillStyle='#fff';for(let i=0;i<3;i++){svCx.fillRect(80+i*120,148,3,4);svCx.fillStyle='#8b4020';svCx.fillRect(80+i*120,148,3,1);svCx.fillStyle='#fff'}
  }

  // People
  for(let p=0;p<8;p++){
    const px=30+p*45+Math.sin(fr*.05+p)*3,py=142;
    svCx.fillStyle=['#ffccaa','#c89060','#ffd8b0'][p%3];svCx.fillRect(px,py,3,3);
    svCx.fillStyle=['#4488cc','#cc4488','#88cc44','#dd8844'][p%4];svCx.fillRect(px,py+3,3,5);
  }

  // Auto-rickshaw in street
  const ax=(fr*2)%w;
  svCx.fillStyle='#88aa20';svCx.fillRect(ax,110,10,6);svCx.fillStyle='#222';svCx.fillRect(ax+1,108,8,3);

  if(nit){for(let i=0;i<12;i++){svCx.fillStyle=`rgba(255,255,220,${.3+Math.sin(fr*.05+i)*.2})`;svCx.fillRect(H(i,0)%w,H(i,1)%50,1,1)}}

  // Venue name overlay
  svCx.fillStyle='rgba(0,0,0,.5)';svCx.fillRect(0,h-20,w,20);
  svCx.fillStyle=col;svCx.font='bold 8px monospace';svCx.fillText(v.nm.split('\n')[0],6,h-8);
  document.getElementById('sv-label').textContent=`▸ ${v.nm.split('\n')[0].toUpperCase()}`;
  document.getElementById('sv-coords').textContent=v.lat?`${v.lat.toFixed(3)}°N, ${v.lng.toFixed(3)}°E`:'VIRTUAL';
}

// ═══ MARKERS ═══
function vis(v){return flt==='all'||flt===v.src||flt===v.cat}
function dM(v){
  if(!vis(v))return;
  const x=(v.c||0)*TS+TS/2,y=(v.r||0)*TS+TS/2,cC=CC[v.cat]||'#fff',sC=SC[v.src]||cC;
  const p=Math.sin(fr*.05+v.id*1.3)*2,sz=6+p;
  const g=cx.createRadialGradient(x,y,0,x,y,sz*3);g.addColorStop(0,sC+'50');g.addColorStop(1,sC+'00');
  cx.fillStyle=g;cx.fillRect(x-sz*3,y-sz*3,sz*6,sz*6);
  cx.fillStyle='rgba(0,0,0,.5)';cx.fillRect(x-sz*.6+1,y-sz+1,sz*1.2,sz*2);
  cx.fillStyle=cC;cx.beginPath();cx.moveTo(x,y-sz);cx.lineTo(x+sz*.6,y);cx.lineTo(x,y+sz);cx.lineTo(x-sz*.6,y);cx.closePath();cx.fill();
  cx.fillStyle=sC+'66';cx.beginPath();cx.moveTo(x,y-sz*.4);cx.lineTo(x+sz*.25,y);cx.lineTo(x,y+sz*.4);cx.lineTo(x-sz*.25,y);cx.closePath();cx.fill();
  cx.fillStyle='rgba(0,0,0,.5)';cx.fillRect(x-1,y-1,2,2);
  if(sel&&sel.id===v.id){cx.strokeStyle='#fff';cx.lineWidth=1.5;cx.setLineDash([3,2]);cx.beginPath();cx.arc(x,y,sz+4,0,Math.PI*2);cx.stroke();cx.setLineDash([])}
}

function dVB(){const x=50*TS,w=(CO-50)*TS,h=RO*TS;const a=.3+Math.sin(fr*.03)*.1;cx.strokeStyle=`rgba(100,220,200,${a})`;cx.lineWidth=2;cx.setLineDash([4,3]);cx.strokeRect(x+1,1,w-2,h-2);cx.setLineDash([])}
function dNi(){cx.fillStyle='rgba(0,4,20,.35)';cx.fillRect(0,0,cv.width,cv.height)}

// ═══ MINIMAP ═══
function drawMinimap(){
  mmCx.fillStyle=nit?'#050a12':'#90b8d8';mmCx.fillRect(0,0,CO,RO);
  for(let r=0;r<RO;r++)for(let c=0;c<CO;c++){
    const t=MAP[r][c];
    mmCx.fillStyle=t===T.P?(nit?'#0a2006':'#3a8028'):t===T.W?(nit?'#041830':'#4090d0'):t===T.M?(nit?'#302000':'#d4a830'):t===T.R?(nit?'#2a2218':'#c8a87a'):t===T.V?(nit?'#020508':'#060f1a'):(nit?'#1a1008':'#b08060');
    mmCx.fillRect(c,r,1,1);
  }
  V.forEach(v=>{if(!vis(v))return;mmCx.fillStyle=CC[v.cat]||'#fff';mmCx.fillRect(v.c||0,v.r||0,2,2)});
  const rect=mapArea.getBoundingClientRect();
  const vp=document.getElementById('mini-vp');
  const sx=120/CO,sy=80/RO;
  vp.style.left=(-panX/zoom*sx/TS)+'px';vp.style.top=(-panY/zoom*sy/TS)+'px';
  vp.style.width=(rect.width/zoom*sx/TS)+'px';vp.style.height=(rect.height/zoom*sy/TS)+'px';
}

// ═══ RENDER ═══
function render(){
  fr++;cx.fillStyle=nit?'#050a12':(rain?'#7898a8':'#90b8d8');cx.fillRect(0,0,cv.width,cv.height);
  for(let r=0;r<RO;r++)for(let c=0;c<CO;c++)drawTile(r,c,MAP[r][c]);
  dVB();dL();drawDogs();drawAutos();drawMetro();drawLandmarks();drawTrafficSignals();
  if(nit)dNi();drawBirds();drawRain();drawParticles();
  V.forEach(v=>dM(v));
  if(sel)drawStreetView(sel);
  if(fr%10===0)drawMinimap();
  requestAnimationFrame(render);
}

// ═══ INTERACTIONS ═══
cv.addEventListener('click',e=>{
  if(dragging)return;
  const rc=cv.getBoundingClientRect();const sx=cv.width/rc.width,sy=cv.height/rc.height;
  const mx=(e.clientX-rc.left)*sx,my=(e.clientY-rc.top)*sy;
  let hit=null;V.forEach(v=>{if(!vis(v))return;const vx=(v.c||0)*TS+TS/2,vy=(v.r||0)*TS+TS/2;if(Math.hypot(mx-vx,my-vy)<18)hit=v});
  if(hit){sel=hit;openP(hit);panTo((hit.c||0)*TS,(hit.r||0)*TS)}else{sel=null;closeP()}
});
cv.addEventListener('mousemove',e=>{
  const rc=cv.getBoundingClientRect();const sx=cv.width/rc.width,sy=cv.height/rc.height;
  const mx=(e.clientX-rc.left)*sx,my=(e.clientY-rc.top)*sy;
  const tt=document.getElementById('tt');let hov=null;
  V.forEach(v=>{if(!vis(v))return;const vx=(v.c||0)*TS+TS/2,vy=(v.r||0)*TS+TS/2;if(Math.hypot(mx-vx,my-vy)<18)hov=v});
  if(hov){cv.style.cursor='pointer';tt.innerHTML=`<b style="color:${CC[hov.cat]}">${hov.nm.replace('\n','<br>')}</b><br><span style="color:${SC[hov.src]};font-size:4px">${SN[hov.src]}</span><br><span style="color:#5a7a9a">${hov.ev.length} events</span>`;
  const cr=mapArea.getBoundingClientRect();tt.style.left=(e.clientX-cr.left+12)+'px';tt.style.top=(e.clientY-cr.top-10)+'px';tt.style.display='block'}else{cv.style.cursor='grab';tt.style.display='none'}
});

// ═══ PANEL ═══
function openP(v){
  const cC=CC[v.cat]||'#fff',sC=SC[v.src]||'#aaa';
  let html=`<div class="vn">${v.nm.replace('\n','<br>')}</div>
  <div class="vs"><span style="color:${sC};border:1px solid ${sC}33;padding:1px 4px;font-size:4px">${SN[v.src]}</span> · ${v.ev.length} events${v.lat?` · ${v.lat.toFixed(3)}°N`:''}</div>`;
  if(v.vibe)html+=`<div class="vibe-tag" style="border-color:${cC}44;color:${cC}88">${v.vibe}</div>`;
  v.ev.forEach(e=>{
    const tags=(e.tg||[]).map(t=>`<span style="color:${cC};border-color:${cC}33">${t}</span>`).join('');
    const lk=e.lk?`<a class="lnk" href="https://${e.lk}" target="_blank" style="color:${sC}">▸ ${SN[v.src]}</a>`:'';
    const bd=e.s==='x'?`<span class="st st-s">SOLD OUT</span>`:e.s==='w'?`<span class="st st-w">WAITLIST</span>`:e.p==='Free'?`<span class="st st-f">FREE</span>`:'';
    let ab='';if(e.a&&e.c){const pc=Math.min(100,Math.round(e.a/e.c*100));ab=`<div class="abar"><div class="afill" style="width:${pc}%;background:${pc>80?'#ff6b6b':'#4ade80'}"></div></div><div style="font-size:4px;color:#3a5a7a">${e.a}/${e.c}</div>`}
    html+=`<div class="ec"><div class="et" style="color:${cC}">${e.t}</div><div class="eby">${e.by||''}</div><div class="em">📅 ${e.d} · 🎟 ${e.p}</div>${bd}${ab}${lk}<div class="tgs">${tags}</div></div>`;
  });
  document.getElementById('rpanel-content').innerHTML=html;
  document.getElementById('rpanel').classList.remove('closed');
}
function closeP(){document.getElementById('rpanel').classList.add('closed');sel=null}

function toggleAll(){
  const ae=document.getElementById('all-events');
  if(ae.classList.contains('show')){ae.classList.remove('show');return}
  ae.classList.add('show');
  const allEv=[];V.forEach(v=>{if(!vis(v))return;v.ev.forEach(e=>allEv.push({...e,vnm:v.nm.split('\n')[0],cat:v.cat,src:v.src}))});
  document.getElementById('ae-header').textContent=`ALL EVENTS — ${allEv.length} events across ${V.filter(v=>vis(v)).length} venues`;
  document.getElementById('ae-grid').innerHTML=allEv.map(e=>{
    const cC=CC[e.cat]||'#fff',sC=SC[e.src]||'#aaa';
    const bd=e.s==='x'?`<span class="st st-s">SOLD OUT</span>`:e.s==='w'?`<span class="st st-w">WAITLIST</span>`:e.p==='Free'?`<span class="st st-f">FREE</span>`:'';
    return`<div class="ae-card"><span class="ae-src" style="color:${sC};border-color:${sC}33">${SN[e.src]}</span><div class="ae-title" style="color:${cC}">${e.t}</div><div class="ae-meta">📅 ${e.d} · 🎟 ${e.p} ${bd}</div><div style="font-size:4px;color:#5a7a9a">📍 ${e.vnm}</div></div>`}).join('');
}

function sF(f,b){flt=f;document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));b.classList.add('on');closeP()}
function togD(){nit=!nit;document.getElementById('db').textContent=nit?'☾ NIGHT':'☀ DAY'}
function togR(){rain=!rain;const rb=document.getElementById('rb');rb.textContent=rain?'☂ STOP':'☂ RAIN';rb.style.background=rain?'rgba(100,160,230,.15)':'none'}

setInterval(()=>{tM=(tM+1)%(24*60);const h2=Math.floor(tM/60),mn=tM%60;document.getElementById('ck').textContent=`${((h2%12)||12).toString().padStart(2,'0')}:${mn.toString().padStart(2,'0')} ${h2>=12?'PM':'AM'}`;const ni=tM<6*60||tM>=19*60;if(ni!==nit){nit=ni;document.getElementById('db').textContent=nit?'☾ NIGHT':'☀ DAY'}},200);

applyTransform();render();
</script>
