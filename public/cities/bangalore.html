<script>
// ═══ CONFIG ═══
const TS=12,CO=80,RO=56;
let nit=false,flt='all',fr=0,sel=null,tM=9*60,rain=false;
let zoom=1,panX=0,panY=0,dragging=false,dragStartX=0,dragStartY=0;
const T={G:0,R:1,B:2,P:3,W:4,M:5,V:6};
const CC={tech:'#00bcd4',food:'#ffd700',social:'#e879f9',wellness:'#4ade80',art:'#c678dd',music:'#ff69b4',popup:'#ff9f43',virtual:'#78ffd6'};
const SC={luma:'#a78bfa',scene:'#fbbf24','3p':'#34d399',allevents:'#f97316',district:'#ef4444'};
const SN={luma:'LUMA',scene:'PUTTINGSCENE','3p':'YOURTHIRDPLACE',allevents:'ALLEVENTS',district:'DISTRICT'};

// ═══ REAL BANGALORE COORDINATES → TILE MAPPING ═══
const BLR={n:13.07,s:12.87,w:77.48,e:77.78};
function geo2tile(lat,lng){
  return{
    c:Math.round((lng-BLR.w)/(BLR.e-BLR.w)*(CO-4))+2,
    r:Math.round((BLR.n-lat)/(BLR.n-BLR.s)*(RO-4))+2
  };
}
function H(r,c){return(r*73856093^c*19349663)&0x7FFFFFFF}

// ═══ CITY BOUNDARY POLYGON (real Bangalore municipal limits) ═══
const CITY_BOUNDARY=[
  [13.065,77.50],[13.07,77.54],[13.07,77.58],[13.065,77.62],[13.06,77.66],
  [13.055,77.70],[13.04,77.74],[13.02,77.76],[12.99,77.77],[12.96,77.77],
  [12.93,77.76],[12.91,77.74],[12.895,77.72],[12.885,77.68],[12.88,77.64],
  [12.88,77.60],[12.885,77.56],[12.895,77.52],[12.92,77.50],[12.95,77.49],
  [12.98,77.485],[13.01,77.49],[13.04,77.495]
];
function ptInPoly(lat,lng,poly){
  let inside=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const yi=poly[i][0],xi=poly[i][1],yj=poly[j][0],xj=poly[j][1];
    if(((yi>lat)!==(yj>lat))&&(lng<(xj-xi)*(lat-yi)/(yj-yi)+xi))inside=!inside;
  }
  return inside;
}
function tileToGeo(r,c){
  return{lat:BLR.n-(r-2)/(RO-4)*(BLR.n-BLR.s),lng:BLR.w+(c-2)/(CO-4)*(BLR.e-BLR.w)};
}
function isCityTile(r,c){
  const g=tileToGeo(r,c);
  return ptInPoly(g.lat,g.lng,CITY_BOUNDARY);
}

// ═══ REAL ROAD NETWORK ═══
const ROADS=[
  {nm:'Outer Ring Road',pts:[[12.905,77.56],[12.915,77.60],[12.925,77.64],[12.935,77.68],[12.950,77.72],[12.965,77.74],[12.99,77.75],[13.01,77.74],[13.03,77.72],[13.04,77.68],[13.045,77.64],[13.04,77.60],[13.03,77.56],[13.01,77.53],[12.99,77.52],[12.965,77.51],[12.94,77.52],[12.92,77.54]]},
  {nm:'MG Road',pts:[[12.975,77.590],[12.975,77.600],[12.975,77.610],[12.975,77.620]]},
  {nm:'Hosur Road',pts:[[12.975,77.595],[12.960,77.600],[12.940,77.610],[12.920,77.620],[12.905,77.630]]},
  {nm:'Old Airport Road',pts:[[12.965,77.595],[12.960,77.610],[12.955,77.630],[12.950,77.650],[12.948,77.670]]},
  {nm:'Bellary Road',pts:[[12.980,77.590],[12.995,77.590],[13.010,77.590],[13.025,77.585],[13.040,77.580],[13.055,77.575]]},
  {nm:'Mysore Road',pts:[[12.970,77.580],[12.960,77.565],[12.950,77.550],[12.940,77.535],[12.930,77.520]]},
  {nm:'Bannerghatta Road',pts:[[12.955,77.595],[12.940,77.595],[12.925,77.598],[12.910,77.600],[12.895,77.600]]},
  {nm:'Tumkur Road',pts:[[12.980,77.570],[12.995,77.560],[13.010,77.555],[13.030,77.550],[13.050,77.545]]},
  {nm:'Kanakapura Road',pts:[[12.960,77.575],[12.945,77.570],[12.930,77.560],[12.915,77.555]]},
  {nm:'Sarjapur Road',pts:[[12.935,77.615],[12.930,77.640],[12.925,77.660],[12.920,77.680]]},
  {nm:'Whitefield Road',pts:[[12.970,77.650],[12.970,77.670],[12.968,77.690],[12.968,77.720],[12.968,77.740]]},
  {nm:'Hebbal Flyover',pts:[[13.030,77.580],[13.035,77.590],[13.040,77.600]]},
  {nm:'Seshadri Road',pts:[[12.985,77.575],[12.980,77.585],[12.978,77.595]]},
  {nm:'Sankey Road',pts:[[12.990,77.570],[12.995,77.580],[12.998,77.590]]}
];

// ═══ REAL PARKS, LAKES, MARKETS ═══
const PARKS=[
  {nm:'Cubbon Park',poly:[[12.980,77.590],[12.980,77.600],[12.975,77.605],[12.970,77.600],[12.970,77.590],[12.975,77.588]]},
  {nm:'Lalbagh',poly:[[12.955,77.580],[12.955,77.590],[12.948,77.590],[12.948,77.580]]},
  {nm:'Bannerghatta Bio Park',poly:[[12.895,77.595],[12.895,77.610],[12.885,77.610],[12.885,77.595]]},
  {nm:'JP Park',poly:[[13.005,77.570],[13.005,77.580],[13.000,77.580],[13.000,77.570]]},
  {nm:'Turahalli Forest',poly:[[12.900,77.550],[12.900,77.565],[12.890,77.565],[12.890,77.550]]}
];
const LAKES=[
  {nm:'Ulsoor Lake',poly:[[12.985,77.615],[12.985,77.628],[12.978,77.628],[12.978,77.615]]},
  {nm:'Bellandur Lake',poly:[[12.935,77.665],[12.935,77.690],[12.925,77.690],[12.925,77.665]]},
  {nm:'Agara Lake',poly:[[12.925,77.635],[12.925,77.648],[12.920,77.648],[12.920,77.635]]},
  {nm:'Hebbal Lake',poly:[[13.040,77.585],[13.040,77.600],[13.035,77.600],[13.035,77.585]]},
  {nm:'Sankey Tank',poly:[[12.995,77.570],[12.995,77.578],[12.990,77.578],[12.990,77.570]]}
];
const MARKETS=[
  {nm:'MG Road / Brigade',poly:[[12.978,77.600],[12.978,77.615],[12.972,77.615],[12.972,77.600]]},
  {nm:'Commercial Street',poly:[[12.982,77.605],[12.982,77.612],[12.979,77.612],[12.979,77.605]]},
  {nm:'Jayanagar 4th Block',poly:[[12.930,77.580],[12.930,77.590],[12.925,77.590],[12.925,77.580]]},
  {nm:'Koramangala Hub',poly:[[12.938,77.610],[12.938,77.622],[12.932,77.622],[12.932,77.610]]},
  {nm:'Indiranagar 100ft',poly:[[12.975,77.635],[12.975,77.650],[12.970,77.650],[12.970,77.635]]},
  {nm:'Whitefield IT',poly:[[12.975,77.725],[12.975,77.755],[12.965,77.755],[12.965,77.725]]}
];

// ═══ NEIGHBORHOOD ZONES (real boundaries) ═══
const ZONES=[
  {nm:'Malleshwaram',poly:[[13.010,77.560],[13.010,77.580],[12.995,77.580],[12.995,77.560]],pal:0},
  {nm:'Rajajinagar',poly:[[13.000,77.540],[13.000,77.565],[12.985,77.565],[12.985,77.540]],pal:0},
  {nm:'CBD / MG Road',poly:[[12.985,77.585],[12.985,77.620],[12.970,77.620],[12.970,77.585]],pal:1},
  {nm:'Indiranagar',poly:[[12.980,77.630],[12.980,77.660],[12.965,77.660],[12.965,77.630]],pal:1},
  {nm:'Koramangala',poly:[[12.945,77.605],[12.945,77.635],[12.925,77.635],[12.925,77.605]],pal:3},
  {nm:'HSR Layout',poly:[[12.925,77.630],[12.925,77.660],[12.905,77.660],[12.905,77.630]],pal:3},
  {nm:'Whitefield',poly:[[12.980,77.720],[12.980,77.770],[12.955,77.770],[12.955,77.720]],pal:2},
  {nm:'Marathahalli',poly:[[12.965,77.690],[12.965,77.720],[12.945,77.720],[12.945,77.690]],pal:2},
  {nm:'Hebbal / Manyata',poly:[[13.050,77.570],[13.050,77.610],[13.025,77.610],[13.025,77.570]],pal:4},
  {nm:'Jayanagar',poly:[[12.940,77.570],[12.940,77.600],[12.920,77.600],[12.920,77.570]],pal:0},
  {nm:'JP Nagar',poly:[[12.920,77.570],[12.920,77.600],[12.900,77.600],[12.900,77.570]],pal:3},
  {nm:'Bellandur',poly:[[12.940,77.660],[12.940,77.700],[12.920,77.700],[12.920,77.660]],pal:2},
  {nm:'Electronic City',poly:[[12.900,77.650],[12.900,77.690],[12.880,77.690],[12.880,77.650]],pal:2}
];
function getZone(r,c){
  const g=tileToGeo(r,c);
  for(let i=0;i<ZONES.length;i++){if(ptInPoly(g.lat,g.lng,ZONES[i].poly))return ZONES[i].pal;}
  // Fallback: directional heuristic
  if(c>=CO*0.75)return 2;if(r<=RO*0.25)return 4;if(r>=RO*0.7)return 3;if(c<=CO*0.25)return 0;return 1;
}

// ═══ MAP GENERATION (geographically accurate) ═══
function mk(){
  const m=Array.from({length:RO},()=>Array(CO).fill(T.G));// default: outside city

  // Step 1: Fill city boundary as buildings
  for(let r=0;r<RO;r++)for(let c=0;c<CO;c++){if(isCityTile(r,c))m[r][c]=T.B;}

  // Step 2: Stamp parks
  PARKS.forEach(p=>{
    for(let r=0;r<RO;r++)for(let c=0;c<CO;c++){
      const g=tileToGeo(r,c);
      if(ptInPoly(g.lat,g.lng,p.poly))m[r][c]=T.P;
    }
  });

  // Step 3: Stamp lakes
  LAKES.forEach(l=>{
    for(let r=0;r<RO;r++)for(let c=0;c<CO;c++){
      const g=tileToGeo(r,c);
      if(ptInPoly(g.lat,g.lng,l.poly))m[r][c]=T.W;
    }
  });

  // Step 4: Stamp markets
  MARKETS.forEach(mk=>{
    for(let r=0;r<RO;r++)for(let c=0;c<CO;c++){
      const g=tileToGeo(r,c);
      if(ptInPoly(g.lat,g.lng,mk.poly))m[r][c]=T.M;
    }
  });

  // Step 5: Draw roads by tracing real paths between waypoints
  ROADS.forEach(rd=>{
    for(let i=0;i<rd.pts.length-1;i++){
      const a=geo2tile(rd.pts[i][0],rd.pts[i][1]);
      const b=geo2tile(rd.pts[i+1][0],rd.pts[i+1][1]);
      const steps=Math.max(Math.abs(b.c-a.c),Math.abs(b.r-a.r))*2+1;
      for(let s=0;s<=steps;s++){
        const t=s/steps;
        const rc=Math.round(a.r+(b.r-a.r)*t);
        const cc=Math.round(a.c+(b.c-a.c)*t);
        if(rc>=0&&rc<RO&&cc>=0&&cc<CO&&m[rc][cc]===T.B)m[rc][cc]=T.R;
      }
    }
  });

  // Step 6: Virtual zone (right edge)
  for(let r=0;r<RO;r++)for(let c=CO-6;c<CO;c++)m[r][c]=T.V;

  return m;
}
const MAP=mk();

function getTreeType(r,c){
  const g=tileToGeo(r,c);
  // Cubbon Park / Lalbagh: banyans and gulmohar
  if(g.lat>12.968&&g.lat<12.982&&g.lng>77.588&&g.lng<77.605)return H(r,c)%3===0?'banyan':'gulmohar';
  // JP Park area: mix
  if(g.lat>12.998&&g.lat<13.008&&g.lng>77.568&&g.lng<77.582)return H(r,c)%2===0?'gulmohar':'palm';
  // Whitefield area: palms
  if(g.lng>77.72)return'palm';
  // South: rain trees

function applyTransform(){
  cv.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
  document.getElementById('zoom-info').textContent=`${Math.round(zoom*100)}% · ${V.length} venues`;
}

const mapArea=document.getElementById('map-area');
mapArea.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=mapArea.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const oldZ=zoom;
  zoom=Math.max(0.5,Math.min(4,zoom*(e.deltaY<0?1.15:0.87)));
  panX=mx-(mx-panX)*(zoom/oldZ);
  panY=my-(my-panY)*(zoom/oldZ);
  applyTransform();
},{passive:false});

mapArea.addEventListener('mousedown',e=>{if(e.button===0){dragging=true;dragStartX=e.clientX-panX;dragStartY=e.clientY-panY;e.preventDefault()}});
window.addEventListener('mousemove',e=>{if(dragging){panX=e.clientX-dragStartX;panY=e.clientY-dragStartY;applyTransform()}});
window.addEventListener('mouseup',()=>{dragging=false});

function panTo(tx,ty){
  const rect=mapArea.getBoundingClientRect();
  const targetZ=2;
  zoom=targetZ;
  panX=rect.width/2-tx*zoom;
  panY=rect.height/2-ty*zoom;
  applyTransform();
}

function resetView(){zoom=1;panX=0;panY=0;applyTransform()}

// ═══ TILE DRAWING ═══
function drawTile(r,c,t){
  const x=c*TS,y=r*TS,z=getZone(r,c);
  cx.fillStyle=tCol(r,c,t);cx.fillRect(x,y,TS,TS);

  if(t===T.B){
    const roofs=(nit?RPAL_N:RPAL_D)[z];
    cx.fillStyle=roofs[H(r,c)%roofs.length];cx.fillRect(x+1,y+1,TS-2,4);
    if(z===2){
      cx.fillStyle=nit?'rgba(100,180,255,.5)':'rgba(160,210,255,.5)';
      cx.fillRect(x+2,y+6,5,3);cx.fillRect(x+9,y+6,5,3);cx.fillRect(x+2,y+10,5,3);cx.fillRect(x+9,y+10,5,3);
      if(H(r,c)%4===0){cx.fillStyle=nit?'#2a3a4a':'#8898a8';cx.fillRect(x+12,y,2,4)}
    }else if(z===0){
      const wn=i=>nit?((H(r*11,c*17+i)%7>2)?'rgba(255,190,50,.8)':'rgba(8,8,4,.85)'):'rgba(255,240,200,.3)';
      cx.fillStyle=wn(0);cx.fillRect(x+2,y+7,2,2);cx.fillStyle=wn(1);cx.fillRect(x+7,y+7,2,2);cx.fillStyle=wn(2);cx.fillRect(x+12,y+7,2,2);
      cx.fillStyle=nit?'#1a0c04':'#5a2a10';cx.fillRect(x+6,y+11,4,5);
    }else{
      const wn=i=>nit?((H(r*13,c*19+i)%8>2)?'rgba(255,210,70,.95)':'rgba(6,10,20,.9)'):'rgba(200,230,255,.35)';
      cx.fillStyle=wn(0);cx.fillRect(x+2,y+6,3,3);cx.fillStyle=wn(1);cx.fillRect(x+9,y+6,3,3);
      cx.fillStyle=wn(2);cx.fillRect(x+2,y+11,3,3);cx.fillStyle=wn(3);cx.fillRect(x+9,y+11,3,3);
      cx.fillStyle=nit?'#1a1008':'#6a3a28';cx.fillRect(x+6,y+11,4,5);
    }
    if(H(r,c+2)%5===0){cx.fillStyle=nit?'#1a1a1a':'#888';cx.fillRect(x+2,y-1,4,3)}
    if(z===3&&H(r,c+3)%6===0&&!nit){cx.fillStyle='rgba(60,40,20,.25)';cx.fillRect(x,y-1,TS,1);cx.fillStyle='#cc6666';cx.fillRect(x+3,y-1,2,2);cx.fillStyle='#6666cc';cx.fillRect(x+8,y-1,2,2)}
  }

  if(t===T.P){
    const tt=getTreeType(r,c);
    if(tt==='banyan'&&H(r,c)%3===0){
      cx.fillStyle=nit?'#1a1008':'#5a3818';cx.fillRect(x+7,y+8,2,8);
      cx.fillStyle=nit?'#120c04':'#7a5030';cx.fillRect(x+3,y+6,1,5);cx.fillRect(x+12,y+5,1,6);
      cx.fillStyle=nit?'#0a2206':'#1a5a10';cx.fillRect(x-1,y+1,TS+2,8);
      cx.fillStyle=nit?'#0c2a08':'#2a7018';cx.fillRect(x+1,y+0,TS-2,6);
      cx.fillStyle=nit?'#0e3010':'#3a8028';cx.fillRect(x+3,y-1,10,4);
    }else if(tt==='palm'&&H(r,c)%3!==2){
      cx.fillStyle=nit?'#1a1408':'#8a6830';cx.fillRect(x+7,y+4,2,12);
      cx.fillStyle=nit?'#0c2a08':'#2a8018';cx.fillRect(x+2,y+1,5,3);cx.fillRect(x+9,y+1,5,3);
      cx.fillStyle=nit?'#0e3410':'#3a9028';cx.fillRect(x+5,y+0,6,3);
    }else if(tt==='gulmohar'&&H(r,c)%3!==1){
      cx.fillStyle=nit?'#1a1008':'#6a4020';cx.fillRect(x+7,y+10,2,6);
      cx.fillStyle=nit?'#0a2006':'#2a6818';cx.fillRect(x+3,y+3,10,8);

const particles=[];
function spawnParticles(){
  // Fireflies in parks at night
  if(nit&&fr%8===0){
    for(let r=11;r<=15;r+=2)for(let c=8;c<=18;c+=3){
      if(H(r+fr,c)%20===0)particles.push({x:c*TS+H(r,c)%TS,y:r*TS+H(c,r)%TS,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,life:80+Math.random()*40,type:'firefly'});
    }
  }
  // Music notes near concert venues
  if(fr%20===0){
    V.filter(v=>v.cat==='music'&&vis(v)).forEach(v=>{
      if(H(fr,v.id)%4===0)particles.push({x:v.c*TS+8,y:v.r*TS-4,vx:(Math.random()-.5)*.5,vy:-0.3-Math.random()*.3,life:50,type:'note',col:CC.music});
    });
  }
  // Steam from food venues
  if(fr%12===0){
    V.filter(v=>v.cat==='food'&&vis(v)).forEach(v=>{
      if(H(fr,v.id)%3===0)particles.push({x:v.c*TS+6+Math.random()*4,y:v.r*TS,vx:(Math.random()-.5)*.2,vy:-0.4,life:30,type:'steam'});
    });
  }
}

function drawParticles(){
  spawnParticles();
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.life<=0){particles.splice(i,1);continue}
    const a=Math.min(1,p.life/20);
    if(p.type==='firefly'){
      cx.fillStyle=`rgba(200,255,100,${a*.6+Math.sin(fr*.2+i)*.2})`;
      cx.fillRect(p.x,p.y,2,2);
    }else if(p.type==='note'){
      cx.fillStyle=p.col+Math.round(a*99).toString(16).padStart(2,'0');
      cx.font='6px serif';cx.fillText('♪',p.x,p.y);
    }else if(p.type==='steam'){
      cx.fillStyle=`rgba(200,200,200,${a*.2})`;
      cx.fillRect(p.x,p.y,2,1);
    }
  }
}

  svCx.fillStyle=nit?'#2a2218':'#9a8868';svCx.fillRect(0,100,w,40);
  svCx.fillStyle=nit?'rgba(255,220,60,.1)':'rgba(255,255,200,.3)';
  for(let x=10;x<w;x+=20)svCx.fillRect(x,118,10,2);
  svCx.fillStyle=nit?'#282818':'#d0c098';svCx.fillRect(0,80,w,20);svCx.fillRect(0,140,w,12);

  // Auto-generate buildings based on venue category
  const builds=v.ev.length+2;
  for(let i=0;i<builds;i++){
    const bx=i*(w/builds)+5,bw=w/builds-10,bh=30+i*8+(v.cat==='tech'?15:0);
    svCx.fillStyle=nit?'#1a1a2a':'tCol' in window?'#6080a0':
      v.cat==='food'?['#d08850','#50a080','#5080c0','#c0a050'][i%4]:
      v.cat==='tech'?['#607898','#788898','#6080a0'][i%3]:
      v.cat==='music'?['#6040a0','#a04060','#604080'][i%3]:
      ['#c07850','#d08868','#b86840'][i%3];
    svCx.fillRect(bx,80-bh,bw,bh);
    // Awning/sign colored by venue
    svCx.fillStyle=col+'88';svCx.fillRect(bx,80-bh-4,bw,4);
    // Windows
    for(let wy=4;wy<bh-10;wy+=10){
      for(let wx=3;wx<bw-6;wx+=8){
        svCx.fillStyle=nit?((H(wy,wx+i)%3>0)?'rgba(255,220,80,.7)':'rgba(10,15,30,.8)'):'rgba(180,220,255,.5)';
        svCx.fillRect(bx+wx,80-bh+wy,5,4);
      }
    }
    // Door
    svCx.fillStyle=nit?'rgba(255,200,60,.3)':'#5a3018';
    svCx.fillRect(bx+bw/2-4,80-10,8,10);
  }

  // Category-specific details
  if(v.cat==='food'){
    [60,160,280].forEach(tx=>{svCx.fillStyle=nit?'#1a1a10':'#fff8e0';svCx.fillRect(tx,148,10,4);svCx.fillStyle=nit?'#2a2a20':'#aa8860';svCx.fillRect(tx+3,152,4,6)});
  }
  if(v.cat==='music'){
    svCx.fillStyle=col+'44';svCx.font='8px serif';
    for(let n=0;n<5;n++)svCx.fillText('♪',50+n*70+Math.sin(fr*.1+n)*5,60+Math.cos(fr*.08+n)*8);
  }
  if(v.cat==='tech'){
    svCx.fillStyle='#fff';for(let i=0;i<3;i++){svCx.fillRect(80+i*120,148,3,4);svCx.fillStyle='#8b4020';svCx.fillRect(80+i*120,148,3,1);svCx.fillStyle='#fff'}
  }

  // People
  for(let p=0;p<8;p++){
    const px=30+p*45+Math.sin(fr*.05+p)*3,py=142;
    svCx.fillStyle=['#ffccaa','#c89060','#ffd8b0'][p%3];svCx.fillRect(px,py,3,3);
    svCx.fillStyle=['#4488cc','#cc4488','#88cc44','#dd8844'][p%4];svCx.fillRect(px,py+3,3,5);
  }

  // Auto-rickshaw in street
  const ax=(fr*2)%w;
  svCx.fillStyle='#88aa20';svCx.fillRect(ax,110,10,6);svCx.fillStyle='#222';svCx.fillRect(ax+1,108,8,3);

  if(nit){for(let i=0;i<12;i++){svCx.fillStyle=`rgba(255,255,220,${.3+Math.sin(fr*.05+i)*.2})`;svCx.fillRect(H(i,0)%w,H(i,1)%50,1,1)}}

  // Venue name overlay
  svCx.fillStyle='rgba(0,0,0,.5)';svCx.fillRect(0,h-20,w,20);
  svCx.fillStyle=col;svCx.font='bold 8px monospace';svCx.fillText(v.nm.split('\n')[0],6,h-8);
  document.getElementById('sv-label').textContent=`▸ ${v.nm.split('\n')[0].toUpperCase()}`;
  document.getElementById('sv-coords').textContent=v.lat?`${v.lat.toFixed(3)}°N, ${v.lng.toFixed(3)}°E`:'VIRTUAL';
}

// ═══ MARKERS — PIXEL ART ICONS PER CATEGORY ═══
function vis(v){return flt==='all'||flt===v.src||flt===v.cat}

// Procedural pixel-art sprites by category
function drawIcon(cx,x,y,cat,sz){
  const s=Math.max(1,Math.floor(sz/8));
  switch(cat){
    case 'food':// Coffee cup ☕
      cx.fillStyle='#8B4513';cx.fillRect(x-3*s,y-2*s,6*s,5*s);// cup body
      cx.fillStyle='#D2691E';cx.fillRect(x-2*s,y-2*s,4*s,4*s);// cup front
      cx.fillStyle='#FFE4C4';cx.fillRect(x-1*s,y-1*s,2*s,2*s);// liquid
      cx.fillStyle='#8B4513';cx.fillRect(x+3*s,y-1*s,2*s,3*s);// handle
      cx.fillStyle='rgba(255,255,255,.4)';// steam
      if(fr%20<10){cx.fillRect(x-1*s,y-4*s,1*s,2*s);cx.fillRect(x+1*s,y-5*s,1*s,2*s);}
      break;
    case 'tech':// Laptop 💻
      cx.fillStyle='#607898';cx.fillRect(x-3*s,y-2*s,6*s,4*s);// screen
      cx.fillStyle=nit?'#2040a0':'#90c0ff';cx.fillRect(x-2*s,y-1*s,4*s,2*s);// display
      cx.fillStyle='#4a5a6a';cx.fillRect(x-4*s,y+2*s,8*s,1*s);// keyboard
      if(fr%30<15){cx.fillStyle='#00ff88';cx.fillRect(x-1*s,y-1*s,1*s,1*s);}// cursor blink
      break;
    case 'music':// Mic 🎤
      cx.fillStyle='#c0c0c0';cx.fillRect(x-1*s,y-3*s,2*s,3*s);// mic head
      cx.fillStyle='#888';cx.fillRect(x-0*s,y+0*s,1*s,3*s);// stand
      cx.fillStyle='#666';cx.fillRect(x-2*s,y+3*s,4*s,1*s);// base
      if(fr%16<8){cx.fillStyle='rgba(255,105,180,.3)';cx.fillRect(x-3*s,y-4*s,1*s,1*s);cx.fillRect(x+2*s,y-3*s,1*s,1*s);}// notes
      break;
    case 'art':// Palette 🎨
      cx.fillStyle='#D2691E';cx.fillRect(x-3*s,y-2*s,6*s,4*s);// palette
      cx.fillStyle='#FF4444';cx.fillRect(x-2*s,y-1*s,1*s,1*s);
      cx.fillStyle='#4444FF';cx.fillRect(x+0*s,y-1*s,1*s,1*s);
      cx.fillStyle='#FFFF00';cx.fillRect(x+2*s,y+0*s,1*s,1*s);
      cx.fillStyle='#44FF44';cx.fillRect(x-1*s,y+1*s,1*s,1*s);
      break;
    case 'wellness':// Lotus 🧘
      cx.fillStyle='#4ade80';cx.fillRect(x-1*s,y+1*s,2*s,2*s);// stem
      cx.fillStyle='#e879f9';cx.fillRect(x-2*s,y-2*s,1*s,3*s);cx.fillRect(x+1*s,y-2*s,1*s,3*s);// petals
      cx.fillStyle='#ff69b4';cx.fillRect(x-1*s,y-3*s,2*s,2*s);// center
      break;
    case 'social':// People 👥
      cx.fillStyle='#e879f9';cx.fillRect(x-2*s,y-2*s,2*s,2*s);// head1
      cx.fillRect(x-3*s,y+0*s,3*s,3*s);// body1
      cx.fillStyle='#a78bfa';cx.fillRect(x+1*s,y-2*s,2*s,2*s);// head2
      cx.fillRect(x+0*s,y+0*s,3*s,3*s);// body2
      break;
    case 'popup':// Lightning ⚡
      cx.fillStyle='#ff9f43';cx.fillRect(x+0*s,y-3*s,2*s,2*s);
      cx.fillRect(x-1*s,y-1*s,3*s,1*s);
      cx.fillRect(x-1*s,y+0*s,2*s,2*s);
      cx.fillRect(x-2*s,y+2*s,2*s,1*s);
      break;
    case 'virtual':// Wifi 📡
      cx.fillStyle='#78ffd6';cx.fillRect(x-0*s,y+1*s,1*s,2*s);// antenna
      if(fr%24<12){cx.fillRect(x-2*s,y-1*s,5*s,1*s);}
      if(fr%24<18){cx.fillRect(x-3*s,y-3*s,7*s,1*s);}
      break;
    default:// Generic diamond
      cx.fillRect(x-2*s,y-1*s,4*s,2*s);cx.fillRect(x-1*s,y-2*s,2*s,4*s);
  }
}

function dM(v){
  if(!vis(v))return;
  const x=(v.c||0)*TS+TS/2,y=(v.r||0)*TS+TS/2,cC=CC[v.cat]||'#fff',sC=SC[v.src]||cC;
  const bounce=Math.sin(fr*.05+v.id*1.3)*1.5;
  const yy=y+bounce;
  const sz=8;

  // Glow aura
  const g=cx.createRadialGradient(x,yy,0,x,yy,sz*2.5);
  g.addColorStop(0,sC+'40');g.addColorStop(1,sC+'00');
  cx.fillStyle=g;cx.fillRect(x-sz*2.5,yy-sz*2.5,sz*5,sz*5);

  // Shadow
  cx.fillStyle='rgba(0,0,0,.3)';cx.fillRect(x-3,y+sz-1,6,2);

  // Pin base (source-colored)
  cx.fillStyle=sC;cx.fillRect(x-4,yy-sz-2,8,sz+4);
  cx.fillStyle=sC+'88';cx.fillRect(x-3,yy-sz-1,6,sz+2);

  // Icon
  cx.fillStyle=cC;
  drawIcon(cx,x,yy-3,v.cat,sz);

  // Source badge dot
  cx.fillStyle=sC;cx.fillRect(x-1,yy+sz-3,3,3);

  // Selection ring
  if(sel&&sel.id===v.id){
    cx.strokeStyle='#fff';cx.lineWidth=1.5;cx.setLineDash([3,2]);
    cx.beginPath();cx.arc(x,yy,sz+5,0,Math.PI*2);cx.stroke();cx.setLineDash([]);
  }
}

function dVB(){const x=(CO-6)*TS,w=6*TS,h=RO*TS;const a=.3+Math.sin(fr*.03)*.1;cx.strokeStyle=`rgba(100,220,200,${a})`;cx.lineWidth=2;cx.setLineDash([4,3]);cx.strokeRect(x+1,1,w-2,h-2);cx.setLineDash([])}
function dNi(){cx.fillStyle='rgba(0,4,20,.35)';cx.fillRect(0,0,cv.width,cv.height)}

// ═══ MINIMAP ═══
function drawMinimap(){
  mmCx.fillStyle=nit?'#050a12':'#90b8d8';mmCx.fillRect(0,0,CO,RO);
  for(let r=0;r<RO;r++)for(let c=0;c<CO;c++){
    const t=MAP[r][c];
    mmCx.fillStyle=t===T.P?(nit?'#0a2006':'#3a8028'):t===T.W?(nit?'#041830':'#4090d0'):t===T.M?(nit?'#302000':'#d4a830'):t===T.R?(nit?'#2a2218':'#c8a87a'):t===T.V?(nit?'#020508':'#060f1a'):t===T.G?(nit?'#0a1208':'#607848'):(nit?'#1a1008':'#b08060');
    mmCx.fillRect(c,r,1,1);
  }
  V.forEach(v=>{if(!vis(v))return;mmCx.fillStyle=CC[v.cat]||'#fff';mmCx.fillRect(v.c||0,v.r||0,2,2)});
  const rect=mapArea.getBoundingClientRect();
  const vp=document.getElementById('mini-vp');
  const sx=120/CO,sy=80/RO;
  vp.style.left=(-panX/zoom*sx/TS)+'px';vp.style.top=(-panY/zoom*sy/TS)+'px';
  vp.style.width=(rect.width/zoom*sx/TS)+'px';vp.style.height=(rect.height/zoom*sy/TS)+'px';
}

// ═══ RENDER ═══
function render(){
  fr++;cx.fillStyle=nit?'#050a12':(rain?'#7898a8':'#90b8d8');cx.fillRect(0,0,cv.width,cv.height);
  cx.save();cx.translate(ofsX,ofsY);
  for(let r=0;r<RO;r++)for(let c=0;c<CO;c++)drawTile(r,c,MAP[r][c]);
  drawZoneBorders();dVB();dL();drawDogs();drawAutos();drawMetro();drawLandmarks();drawTrafficSignals();
  drawBirds();drawRain();drawParticles();
  V.forEach(v=>dM(v));
  if(sel)drawStreetView(sel);
  cx.restore();
  if(nit)dNi();
  if(fr%10===0)drawMinimap();
  requestAnimationFrame(render);
}

// ═══ INTERACTIONS ═══
cv.addEventListener('click',e=>{
  if(dragging)return;
  const rc=cv.getBoundingClientRect();const sx=cv.width/rc.width,sy=cv.height/rc.height;
  const mx=(e.clientX-rc.left)*sx-ofsX,my=(e.clientY-rc.top)*sy-ofsY;
  let hit=null;V.forEach(v=>{if(!vis(v))return;const vx=(v.c||0)*TS+TS/2,vy=(v.r||0)*TS+TS/2;if(Math.hypot(mx-vx,my-vy)<18)hit=v});
  if(hit){sel=hit;openP(hit);panTo((hit.c||0)*TS,(hit.r||0)*TS)}else{sel=null;closeP()}
});
cv.addEventListener('mousemove',e=>{
  const rc=cv.getBoundingClientRect();const sx=cv.width/rc.width,sy=cv.height/rc.height;
  const mx=(e.clientX-rc.left)*sx-ofsX,my=(e.clientY-rc.top)*sy-ofsY;
  const tt=document.getElementById('tt');let hov=null;
  V.forEach(v=>{if(!vis(v))return;const vx=(v.c||0)*TS+TS/2,vy=(v.r||0)*TS+TS/2;if(Math.hypot(mx-vx,my-vy)<18)hov=v});
  if(hov){cv.style.cursor='pointer';tt.innerHTML=`<b style="color:${CC[hov.cat]}">${hov.nm.replace('\n','<br>')}</b><br><span style="color:${SC[hov.src]};font-size:4px">${SN[hov.src]}</span><br><span style="color:#5a7a9a">${hov.ev.length} events</span>`;
  const cr=mapArea.getBoundingClientRect();tt.style.left=(e.clientX-cr.left+12)+'px';tt.style.top=(e.clientY-cr.top-10)+'px';tt.style.display='block'}else{cv.style.cursor='grab';tt.style.display='none'}
});

// ═══ PANEL ═══
function openP(v){
  const cC=CC[v.cat]||'#fff',sC=SC[v.src]||'#aaa';
  let html=`<div class="vn">${v.nm.replace('\n','<br>')}</div>
  <div class="vs"><span style="color:${sC};border:1px solid ${sC}33;padding:1px 4px;font-size:4px">${SN[v.src]}</span> · ${v.ev.length} events${v.lat?` · ${v.lat.toFixed(3)}°N`:''}</div>`;
  if(v.vibe)html+=`<div class="vibe-tag" style="border-color:${cC}44;color:${cC}88">${v.vibe}</div>`;
  v.ev.forEach(e=>{
    const tags=(e.tg||[]).map(t=>`<span style="color:${cC};border-color:${cC}33">${t}</span>`).join('');
    const lk=e.lk?`<a class="lnk" href="https://${e.lk}" target="_blank" style="color:${sC}">▸ ${SN[v.src]}</a>`:'';
    const bd=e.s==='x'?`<span class="st st-s">SOLD OUT</span>`:e.s==='w'?`<span class="st st-w">WAITLIST</span>`:e.p==='Free'?`<span class="st st-f">FREE</span>`:'';
    let ab='';if(e.a&&e.c){const pc=Math.min(100,Math.round(e.a/e.c*100));ab=`<div class="abar"><div class="afill" style="width:${pc}%;background:${pc>80?'#ff6b6b':'#4ade80'}"></div></div><div style="font-size:4px;color:#3a5a7a">${e.a}/${e.c}</div>`}
    html+=`<div class="ec"><div class="et" style="color:${cC}">${e.t}</div><div class="eby">${e.by||''}</div><div class="em">📅 ${e.d} · 🎟 ${e.p}</div>${bd}${ab}${lk}<div class="tgs">${tags}</div></div>`;
  });
  document.getElementById('rpanel-content').innerHTML=html;
  document.getElementById('rpanel').classList.remove('closed');
}
function closeP(){document.getElementById('rpanel').classList.add('closed');sel=null}

function toggleAll(){
  const ae=document.getElementById('all-events');
  if(ae.classList.contains('show')){ae.classList.remove('show');return}
  ae.classList.add('show');
  const allEv=[];V.forEach(v=>{if(!vis(v))return;v.ev.forEach(e=>allEv.push({...e,vnm:v.nm.split('\n')[0],cat:v.cat,src:v.src}))});
  document.getElementById('ae-header').textContent=`ALL EVENTS — ${allEv.length} events across ${V.filter(v=>vis(v)).length} venues`;
  document.getElementById('ae-grid').innerHTML=allEv.map(e=>{
    const cC=CC[e.cat]||'#fff',sC=SC[e.src]||'#aaa';
    const bd=e.s==='x'?`<span class="st st-s">SOLD OUT</span>`:e.s==='w'?`<span class="st st-w">WAITLIST</span>`:e.p==='Free'?`<span class="st st-f">FREE</span>`:'';
    return`<div class="ae-card"><span class="ae-src" style="color:${sC};border-color:${sC}33">${SN[e.src]}</span><div class="ae-title" style="color:${cC}">${e.t}</div><div class="ae-meta">📅 ${e.d} · 🎟 ${e.p} ${bd}</div><div style="font-size:4px;color:#5a7a9a">📍 ${e.vnm}</div></div>`}).join('');
}

function sF(f,b){flt=f;document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));b.classList.add('on');closeP()}
function togD(){nit=!nit;document.getElementById('db').textContent=nit?'☾ NIGHT':'☀ DAY'}
function togR(){rain=!rain;const rb=document.getElementById('rb');rb.textContent=rain?'☂ STOP':'☂ RAIN';rb.style.background=rain?'rgba(100,160,230,.15)':'none'}

setInterval(()=>{tM=(tM+1)%(24*60);const h2=Math.floor(tM/60),mn=tM%60;document.getElementById('ck').textContent=`${((h2%12)||12).toString().padStart(2,'0')}:${mn.toString().padStart(2,'0')} ${h2>=12?'PM':'AM'}`;const ni=tM<6*60||tM>=19*60;if(ni!==nit){nit=ni;document.getElementById('db').textContent=nit?'☾ NIGHT':'☀ DAY'}},200);

applyTransform();render();
</script>
