const TS=12,CO=50,RO=60;
let nit=false,flt='all',fr=0,sel=null,tM=10*60,rain=false;
let zoom=1,panX=0,panY=0,dragging=false,dsx=0,dsy=0;
const T={S:0,R:1,B:2,P:3,W:4,M:5};
const CC={tech:'#00bcd4',food:'#ffd700',social:'#e879f9',comedy:'#ff69b4',art:'#c678dd',music:'#ff69b4',sports:'#4ade80',virtual:'#78ffd6',startup:'#f97316',wellness:'#4ade80'};
const SC={bms:'#ef4444',luma:'#a78bfa',district:'#ef4444',allevents:'#f97316',echai:'#34d399',meetup:'#60a5fa',timeout:'#fbbf24',sortmyscene:'#e879f9',townscript:'#c678dd'};
const SN={bms:'BOOKMYSHOW',luma:'LUMA',district:'DISTRICT',allevents:'ALLEVENTS',echai:'ECHAI',meetup:'MEETUP',timeout:'TIMEOUT',sortmyscene:'SORTMYSCENE',townscript:'TOWNSCRIPT'};
function H(r,c){return(r*73856093^c*19349663)&0x7FFFFFFF}

// Mumbai bounding box
const MUM={n:19.28,s:18.88,w:72.77,e:73.05};
function geo(lat,lng){return{c:Math.round((lng-MUM.w)/(MUM.e-MUM.w)*(CO-2))+1,r:Math.round((MUM.n-lat)/(MUM.n-MUM.s)*(RO-2))+1}}
function tileToGeo(r,c){return{lat:MUM.n-(r-1)/(RO-2)*(MUM.n-MUM.s),lng:MUM.w+(c-1)/(CO-2)*(MUM.e-MUM.w)}}
function ptInPoly(lat,lng,poly){
  let inside=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const yi=poly[i][0],xi=poly[i][1],yj=poly[j][0],xj=poly[j][1];
    if(((yi>lat)!==(yj>lat))&&(lng<(xj-xi)*(lat-yi)/(yj-yi)+xi))inside=!inside;
  }
  return inside;
}

// ═══ REAL ROAD NETWORK ═══
const ROADS=[
  {nm:'Western Express Highway',pts:[[19.22,72.85],[19.18,72.85],[19.14,72.85],[19.10,72.85],[19.06,72.84],[19.02,72.84]]},
  {nm:'Eastern Express Highway',pts:[[19.20,72.88],[19.16,72.88],[19.12,72.87],[19.08,72.86],[19.04,72.86]]},
  {nm:'SV Road',pts:[[19.20,72.84],[19.16,72.84],[19.12,72.84],[19.08,72.83],[19.06,72.83]]},
  {nm:'LBS Marg',pts:[[19.18,72.89],[19.14,72.88],[19.10,72.87],[19.06,72.86]]},
  {nm:'Link Road',pts:[[19.18,72.83],[19.14,72.83],[19.10,72.83],[19.08,72.83]]},
  {nm:'Marine Drive',pts:[[18.94,72.82],[18.93,72.82],[18.92,72.83]]},
  {nm:'Worli Sea Link',pts:[[19.03,72.82],[18.99,72.82],[18.97,72.81]]},
  {nm:'Sion-Panvel Highway',pts:[[19.04,72.86],[19.03,72.89],[19.02,72.92],[19.01,72.95]]},
  {nm:'Palm Beach Road',pts:[[19.05,72.99],[19.03,73.00],[19.01,73.01],[18.99,73.02]]},
  {nm:'Vashi Bridge',pts:[[19.06,72.87],[19.06,72.92],[19.06,72.97]]},
  {nm:'Pedder Road',pts:[[18.97,72.81],[18.96,72.82],[18.95,72.82],[18.94,72.83]]}
];

// ═══ REAL PARKS & LAKES ═══
const PARKS=[
  {nm:'SGNP',poly:[[19.24,72.86],[19.24,72.91],[19.20,72.91],[19.20,72.86]]},
  {nm:'Aarey Colony',poly:[[19.16,72.86],[19.16,72.89],[19.13,72.89],[19.13,72.86]]},
  {nm:'Shivaji Park',poly:[[19.03,72.83],[19.03,72.84],[19.02,72.84],[19.02,72.83]]},
  {nm:'Oval Maidan',poly:[[18.93,72.83],[18.93,72.84],[18.925,72.84],[18.925,72.83]]}
];
const LAKES=[
  {nm:'Powai Lake',poly:[[19.13,72.90],[19.13,72.92],[19.12,72.92],[19.12,72.90]]},
  {nm:'Vihar Lake',poly:[[19.15,72.91],[19.15,72.93],[19.14,72.93],[19.14,72.91]]}
];
const MARKETS=[
  {nm:'BKC',poly:[[19.06,72.86],[19.06,72.88],[19.04,72.88],[19.04,72.86]]},
  {nm:'Lower Parel',poly:[[18.99,72.82],[18.99,72.84],[18.98,72.84],[18.98,72.82]]},
  {nm:'Colaba Causeway',poly:[[18.92,72.83],[18.92,72.84],[18.91,72.84],[18.91,72.83]]},
  {nm:'Andheri Commercial',poly:[[19.12,72.84],[19.12,72.87],[19.10,72.87],[19.10,72.84]]}
];

// ═══ NEIGHBORHOOD ZONES ═══
const ZONES=[
  {nm:'Colaba/Fort',poly:[[18.93,72.82],[18.93,72.84],[18.90,72.84],[18.90,72.82]],pal:0},
  {nm:'Marine Drive',poly:[[18.95,72.81],[18.95,72.83],[18.93,72.83],[18.93,72.81]],pal:0},
  {nm:'Worli/LP',poly:[[19.00,72.81],[19.00,72.84],[18.96,72.84],[18.96,72.81]],pal:1},
  {nm:'Bandra',poly:[[19.07,72.82],[19.07,72.86],[19.04,72.86],[19.04,72.82]],pal:1},
  {nm:'BKC',poly:[[19.07,72.86],[19.07,72.89],[19.04,72.89],[19.04,72.86]],pal:2},
  {nm:'Andheri',poly:[[19.14,72.82],[19.14,72.88],[19.10,72.88],[19.10,72.82]],pal:3},
  {nm:'Powai',poly:[[19.13,72.89],[19.13,72.93],[19.10,72.93],[19.10,72.89]],pal:2},
  {nm:'Goregaon/Malad',poly:[[19.18,72.82],[19.18,72.88],[19.14,72.88],[19.14,72.82]],pal:3},
  {nm:'Borivali',poly:[[19.24,72.83],[19.24,72.89],[19.18,72.89],[19.18,72.83]],pal:3},
  {nm:'Navi Mumbai',poly:[[19.08,72.97],[19.08,73.04],[18.98,73.04],[18.98,72.97]],pal:4}
];

function getZone(r,c){
  const g=tileToGeo(r,c);
  for(let i=0;i<ZONES.length;i++){if(ptInPoly(g.lat,g.lng,ZONES[i].poly))return ZONES[i].pal;}
  if(r>=40)return 0;if(r>=32)return 1;if(r>=24&&c>=14)return 2;if(r>=14)return 3;return 3;
}

const BPAL_D=[['#d0a080','#c09070','#e0b090'],['#b87050','#c88060','#a86040'],['#6888a8','#7898b8','#5878a0'],['#c89068','#d8a078','#b88058'],['#d0b898','#c0a888','#e0c8a8']];
const BPAL_N=[['#2a1a10','#3a2418','#1e1008'],['#2e1808','#3a200c','#221004'],['#14202c','#1a2838','#101820'],['#221a0c','#2c2010','#1c1408'],['#2a2418','#342c20','#201c10']];
const PD={0:['#1a3040','#204050','#183848'],1:['#c0a07a','#b89068','#d0b088'],3:['#3a8a30','#4a9e38','#2e7020'],4:['#3888c8','#4898d8','#2878b8'],5:['#c89820','#d8a830','#b88818']};
const PN={0:['#060e18','#081220','#041018'],1:['#302818','#3c3020','#282010'],3:['#0a2006','#0e2808','#082004'],4:['#041830','#061e3a','#031028'],5:['#302000','#3a2604','#281800']};
function tCol(r,c,t){if(t===T.B){const z=getZone(r,c);return(nit?BPAL_N:BPAL_D)[z][H(r,c)%(nit?BPAL_N:BPAL_D)[z].length]}return((nit?PN:PD)[t]||['#888'])[H(r,c)%((nit?PN:PD)[t]||['#888']).length]}

// ═══ MAP GENERATION (geographically accurate peninsula) ═══
function mk(){
  const m=Array.from({length:RO},()=>Array(CO).fill(T.W)); // Arabian Sea default

  // Peninsula shape (preserved from original, adjusted for new grid)
  // Far North: Borivali/Dahisar
  for(let r=2;r<=10;r++)for(let c=3;c<=24;c++)m[r][c]=T.B;
  // North: Goregaon/Malad
  for(let r=11;r<=16;r++)for(let c=3;c<=25;c++)m[r][c]=T.B;
  // Upper-Mid: Andheri/Jogeshwari
  for(let r=17;r<=23;r++)for(let c=3;c<=26;c++)m[r][c]=T.B;
  // Juhu beach jut-out
  for(let r=22;r<=26;r++)for(let c=2;c<=3;c++)m[r][c]=T.B;
  // Mid: Bandra/Khar/Santacruz
  for(let r=24;r<=30;r++)for(let c=4;c<=24;c++)m[r][c]=T.B;
  // BKC extends east
  for(let r=29;r<=34;r++)for(let c=16;c<=26;c++)m[r][c]=T.B;
  // Mid-South: Dadar/Matunga/Sion
  for(let r=31;r<=40;r++)for(let c=6;c<=20;c++)m[r][c]=T.B;
  // Lower Parel / Worli
  for(let r=41;r<=46;r++)for(let c=6;c<=17;c++)m[r][c]=T.B;
  // Worli Sea Face
  for(let r=41;r<=44;r++){m[r][5]=T.B;}
  // Malabar Hill / Breach Candy
  for(let r=47;r<=51;r++)for(let c=7;c<=16;c++)m[r][c]=T.B;
  // Marine Drive / Fort / CST
  for(let r=52;r<=55;r++)for(let c=8;c<=15;c++)m[r][c]=T.B;
  // South Mumbai: Nariman Point/Colaba
  for(let r=56;r<=57;r++)for(let c=10;c<=14;c++)m[r][c]=T.B;
  for(let r=58;r<=59;r++)for(let c=11;c<=13;c++)m[r][c]=T.B;

  // Navi Mumbai
  for(let r=20;r<=42;r++)for(let c=33;c<=46;c++)m[r][c]=T.B;
  // Thane Creek
  for(let r=12;r<=46;r++)for(let c=27;c<=32;c++)m[r][c]=T.W;

  // Stamp parks
  PARKS.forEach(p=>{for(let r=0;r<RO;r++)for(let c=0;c<CO;c++){const g=tileToGeo(r,c);if(ptInPoly(g.lat,g.lng,p.poly)&&m[r][c]===T.B)m[r][c]=T.P;}});
  // Stamp lakes
  LAKES.forEach(l=>{for(let r=0;r<RO;r++)for(let c=0;c<CO;c++){const g=tileToGeo(r,c);if(ptInPoly(g.lat,g.lng,l.poly))m[r][c]=T.W;}});
  // Stamp markets
  MARKETS.forEach(mk=>{for(let r=0;r<RO;r++)for(let c=0;c<CO;c++){const g=tileToGeo(r,c);if(ptInPoly(g.lat,g.lng,mk.poly)&&m[r][c]===T.B)m[r][c]=T.M;}});

  // Draw real roads
  ROADS.forEach(rd=>{
    for(let i=0;i<rd.pts.length-1;i++){
      const a=geo(rd.pts[i][0],rd.pts[i][1]),b=geo(rd.pts[i+1][0],rd.pts[i+1][1]);
      const steps=Math.max(Math.abs(b.c-a.c),Math.abs(b.r-a.r))*2+1;
      for(let s=0;s<=steps;s++){const t=s/steps;const rc=Math.round(a.r+(b.r-a.r)*t),cc=Math.round(a.c+(b.c-a.c)*t);
        if(rc>=0&&rc<RO&&cc>=0&&cc<CO&&m[rc][cc]===T.B)m[rc][cc]=T.R;}
    }
  });

  return m;
}
const MAP=mk();

// ═══ TILE DRAWING ═══
function drawTile(r,c,t){
  const x=c*TS,y=r*TS;cx.fillStyle=tCol(r,c,t);cx.fillRect(x,y,TS,TS);
  if(t===T.B){
    const z=getZone(r,c);
    const roofC=nit?['#2a0e08','#142808','#0e1828'][z%3]:['#8b3a2a','#5a8a3a','#3a5a8a'][z%3];
    cx.fillStyle=roofC;cx.fillRect(x+1,y+1,TS-2,3);
    const wn=i=>nit?((H(r*13,c*19+i)%8>2)?'rgba(255,210,70,.9)':'rgba(6,10,20,.9)'):'rgba(200,230,255,.35)';
    cx.fillStyle=wn(0);cx.fillRect(x+2,y+5,2,2);cx.fillStyle=wn(1);cx.fillRect(x+8,y+5,2,2);
    cx.fillStyle=wn(2);cx.fillRect(x+2,y+9,2,2);cx.fillStyle=wn(3);cx.fillRect(x+8,y+9,2,2);
    cx.fillStyle=nit?'#1a0c04':'#5a3018';cx.fillRect(x+5,y+10,4,4);
    if(H(r,c+2)%5===0){cx.fillStyle=nit?'#1a1a1a':'#888';cx.fillRect(x+2,y-1,3,2)}
  }
  if(t===T.P){
    if(H(r,c)%3===0){cx.fillStyle=nit?'#1a1008':'#5a3818';cx.fillRect(x+6,y+7,2,7);cx.fillStyle=nit?'#0a2206':'#1a5a10';cx.fillRect(x+1,y+1,TS-2,7);cx.fillStyle=nit?'#0c2a08':'#2a7018';cx.fillRect(x+3,y+0,8,5)}
    else if(H(r,c)%3===1){cx.fillStyle=nit?'#1a1408':'#8a6830';cx.fillRect(x+6,y+3,2,11);cx.fillStyle=nit?'#0c2a08':'#2a8018';cx.fillRect(x+2,y+0,4,3);cx.fillRect(x+8,y+0,4,3);cx.fillStyle=nit?'#0e3410':'#3a9028';cx.fillRect(x+4,y-1,6,3)}
    else{cx.fillStyle=nit?'#0a2408':'#2a6018';cx.fillRect(x+2,y+7,4,4);cx.fillRect(x+3,y+5,2,3)}
  }
  if(t===T.W){
    if((c+Math.floor(fr/10))%4<2){cx.fillStyle=nit?'#041830':'#2868a8';cx.fillRect(x+1,y+4,TS-2,2);cx.fillRect(x+3,y+10,TS-6,2)}
    if(fr%18<9&&H(r,c)%4===0){cx.fillStyle=nit?'rgba(60,120,200,.2)':'rgba(200,240,255,.4)';cx.fillRect(x+H(r,c)%8,y+H(r+1,c)%8,3,1)}
  }
  if(t===T.M){
    const aw=nit?['#280800','#0a1020']:['#e06020','#2080d0','#d04010','#e0a020'];
    cx.fillStyle=aw[H(r,c)%aw.length];cx.fillRect(x,y,TS,4);
    cx.fillStyle=nit?'rgba(60,40,20,.5)':'rgba(255,255,255,.4)';for(let s=1;s<TS;s+=4)cx.fillRect(x+s,y+1,2,2);
    cx.fillStyle=nit?'rgba(255,200,60,.5)':'rgba(180,220,255,.4)';cx.fillRect(x+2,y+5,TS-4,3);
    if(nit&&H(r,c)%3===0){cx.fillStyle=['rgba(255,60,120,.3)','rgba(60,200,255,.3)','rgba(255,200,60,.3)'][H(r,c)%3];cx.fillRect(x+2,y-1,TS-4,2)}
  }
  if(t===T.R){
    if((c+Math.floor(fr/16))%4===0){cx.fillStyle=nit?'rgba(255,220,60,.1)':'rgba(255,255,200,.2)';cx.fillRect(x+5,y+6,4,2)}
    if(H(r,c)%14===0){const px=x+((fr*2+H(r,c)*3)%TS),py=y+3+H(r,c)%6;cx.fillStyle=nit?'rgba(255,200,150,.4)':'#ffccaa';cx.fillRect(px,py,2,2);cx.fillStyle=['#4488cc','#cc4488','#88cc44'][H(r,c)%3];cx.fillRect(px,py+2,2,3)}
    if([5,10,15,25,30,40].includes(r)&&H(r,c)%10===0){const cx2=x+(fr+H(r,c)*4)%(TS*2);if(cx2>=x&&cx2<x+TS-5){cx.fillStyle=nit?['#3a2020','#203a20'][H(r,c)%2]:['#dd3333','#3366dd','#dddd33','#ffa500'][H(r,c)%4];cx.fillRect(cx2,y+2,5,3)}}
  }
}

  const centPts=[[18.94,72.835],[18.97,72.835],[19.02,72.84],[19.05,72.84],[19.08,72.85],[19.12,72.86],[19.16,72.87],[19.20,72.88]];
  cx.strokeStyle=nit?'rgba(60,60,200,.4)':'rgba(60,60,200,.5)';cx.lineWidth=2;cx.beginPath();
  centPts.forEach((p,i)=>{const t=geo(p[0],p[1]);i===0?cx.moveTo(t.c*TS+TS/2,t.r*TS+TS/2):cx.lineTo(t.c*TS+TS/2,t.r*TS+TS/2)});cx.stroke();
  const cProg=(fr*1.2)%(centPts.length-1);const cI=Math.floor(cProg),cF=cProg-cI;
  if(cI<centPts.length-1){const a=geo(centPts[cI][0],centPts[cI][1]),b=geo(centPts[cI+1][0],centPts[cI+1][1]);
    cx.fillStyle=nit?'#202080':'#4040c0';cx.fillRect(a.c*TS+(b.c-a.c)*cF*TS,a.r*TS+(b.r-a.r)*cF*TS,6,TS);}
  // Harbour Line (CST → Panvel via Vashi)
  const hrbPts=[[18.94,72.835],[19.04,72.855],[19.06,72.87],[19.06,72.92],[19.04,72.97],[19.02,73.00]];
  cx.strokeStyle=nit?'rgba(60,180,60,.3)':'rgba(60,180,60,.4)';cx.lineWidth=2;cx.setLineDash([4,3]);cx.beginPath();
  hrbPts.forEach((p,i)=>{const t=geo(p[0],p[1]);i===0?cx.moveTo(t.c*TS+TS/2,t.r*TS+TS/2):cx.lineTo(t.c*TS+TS/2,t.r*TS+TS/2)});cx.stroke();cx.setLineDash([]);
  // Metro Line 1 (Versova-Ghatkopar, east-west)
  const m1Pts=[[19.13,72.82],[19.12,72.84],[19.11,72.87],[19.09,72.90]];
  cx.strokeStyle=nit?'rgba(60,160,200,.4)':'rgba(60,160,200,.5)';cx.lineWidth=2;cx.beginPath();
  m1Pts.forEach((p,i)=>{const t=geo(p[0],p[1]);i===0?cx.moveTo(t.c*TS+TS/2,t.r*TS+TS/2):cx.lineTo(t.c*TS+TS/2,t.r*TS+TS/2)});cx.stroke();
}

function drawLandmarks(){
  // Gateway of India (Colaba)
  const gw=geo(18.922,72.835);let gx=gw.c*TS,gy=gw.r*TS;
  cx.fillStyle=nit?'#1a1808':'#c8b890';cx.fillRect(gx+2,gy+3,10,8);
  cx.fillStyle=nit?'#2a2008':'#b0a070';cx.fillRect(gx+4,gy+1,6,3);cx.fillRect(gx+5,gy-1,4,2);cx.fillRect(gx+6,gy-2,2,2);

  // Bandra-Worli Sea Link (19.04°N → 18.99°N along ~72.82°E)
  const slA=geo(19.04,72.815),slB=geo(18.99,72.815),slM=geo(19.015,72.808);
  cx.strokeStyle=nit?'rgba(200,200,200,.3)':'rgba(200,200,200,.5)';cx.lineWidth=2;
  cx.beginPath();cx.moveTo(slA.c*TS+TS/2,slA.r*TS+TS/2);cx.quadraticCurveTo(slM.c*TS+TS/2,slM.r*TS+TS/2,slB.c*TS+TS/2,slB.r*TS+TS/2);cx.stroke();
  // Suspension cables
  const slC1=geo(19.03,72.81),slC2=geo(19.005,72.81);
  cx.strokeStyle=nit?'rgba(200,200,200,.15)':'rgba(200,200,200,.25)';cx.lineWidth=1;
  cx.beginPath();cx.moveTo(slC1.c*TS+TS/2,slC1.r*TS+TS/2);cx.lineTo(slC1.c*TS+TS/2,slC1.r*TS-6);cx.stroke();
  cx.beginPath();cx.moveTo(slC2.c*TS+TS/2,slC2.r*TS+TS/2);cx.lineTo(slC2.c*TS+TS/2,slC2.r*TS-6);cx.stroke();
}

// ═══ PHASE 5: PARTICLES ═══
const particles=[];
function updParticles(){
  if(nit&&fr%10===0){for(let r=2;r<=8;r+=3)for(let c=3;c<=10;c+=4){if(H(r+fr,c)%15===0)particles.push({x:c*TS+H(r,c)%TS,y:r*TS+H(c,r)%TS,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,life:60,type:'f'})}}
  if(fr%25===0)V.filter(v=>v.cat==='music'&&vis(v)).forEach(v=>{if(H(fr,v.id)%3===0)particles.push({x:(v.c||0)*TS+7,y:(v.r||0)*TS-3,vx:(Math.random()-.5)*.4,vy:-.3,life:40,type:'n',col:CC.music})});
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life--;if(p.life<=0){particles.splice(i,1);continue}const a=Math.min(1,p.life/15);if(p.type==='f'){cx.fillStyle=`rgba(200,255,100,${a*.5+Math.sin(fr*.2+i)*.2})`;cx.fillRect(p.x,p.y,2,2)}else if(p.type==='n'){cx.fillStyle=p.col+Math.round(a*80).toString(16).padStart(2,'0');cx.font='5px serif';cx.fillText('♪',p.x,p.y)}}
}

// ═══ MARKERS — PIXEL ART ICONS PER CATEGORY ═══
function vis(v){return flt==='all'||flt===v.src||flt===v.cat}

function drawIcon(cx,x,y,cat,sz){
  const s=Math.max(1,Math.floor(sz/8));
  switch(cat){
    case 'food':cx.fillStyle='#8B4513';cx.fillRect(x-3*s,y-2*s,6*s,5*s);cx.fillStyle='#D2691E';cx.fillRect(x-2*s,y-2*s,4*s,4*s);cx.fillStyle='#FFE4C4';cx.fillRect(x-1*s,y-1*s,2*s,2*s);cx.fillStyle='#8B4513';cx.fillRect(x+3*s,y-1*s,2*s,3*s);if(fr%20<10){cx.fillStyle='rgba(255,255,255,.4)';cx.fillRect(x-1*s,y-4*s,1*s,2*s);cx.fillRect(x+1*s,y-5*s,1*s,2*s);}break;
    case 'tech':cx.fillStyle='#607898';cx.fillRect(x-3*s,y-2*s,6*s,4*s);cx.fillStyle=nit?'#2040a0':'#90c0ff';cx.fillRect(x-2*s,y-1*s,4*s,2*s);cx.fillStyle='#4a5a6a';cx.fillRect(x-4*s,y+2*s,8*s,1*s);if(fr%30<15){cx.fillStyle='#00ff88';cx.fillRect(x-1*s,y-1*s,1*s,1*s);}break;
    case 'comedy':cx.fillStyle='#ff69b4';cx.fillRect(x-3*s,y-2*s,6*s,4*s);cx.fillStyle='#fff';cx.fillRect(x-2*s,y-1*s,1*s,1*s);cx.fillRect(x+1*s,y-1*s,1*s,1*s);cx.fillStyle='#333';cx.fillRect(x-2*s,y+1*s,4*s,1*s);cx.fillRect(x-1*s,y+2*s,2*s,1*s);break;
    case 'music':cx.fillStyle='#c0c0c0';cx.fillRect(x-1*s,y-3*s,2*s,3*s);cx.fillStyle='#888';cx.fillRect(x,y,1*s,3*s);cx.fillStyle='#666';cx.fillRect(x-2*s,y+3*s,4*s,1*s);if(fr%16<8){cx.fillStyle='rgba(255,105,180,.3)';cx.fillRect(x-3*s,y-4*s,1*s,1*s);cx.fillRect(x+2*s,y-3*s,1*s,1*s);}break;
    case 'art':cx.fillStyle='#D2691E';cx.fillRect(x-3*s,y-2*s,6*s,4*s);cx.fillStyle='#FF4444';cx.fillRect(x-2*s,y-1*s,1*s,1*s);cx.fillStyle='#4444FF';cx.fillRect(x+0*s,y-1*s,1*s,1*s);cx.fillStyle='#FFFF00';cx.fillRect(x+2*s,y+0*s,1*s,1*s);cx.fillStyle='#44FF44';cx.fillRect(x-1*s,y+1*s,1*s,1*s);break;
    case 'wellness':cx.fillStyle='#4ade80';cx.fillRect(x-1*s,y+1*s,2*s,2*s);cx.fillStyle='#e879f9';cx.fillRect(x-2*s,y-2*s,1*s,3*s);cx.fillRect(x+1*s,y-2*s,1*s,3*s);cx.fillStyle='#ff69b4';cx.fillRect(x-1*s,y-3*s,2*s,2*s);break;
    case 'social':cx.fillStyle='#e879f9';cx.fillRect(x-2*s,y-2*s,2*s,2*s);cx.fillRect(x-3*s,y+0*s,3*s,3*s);cx.fillStyle='#a78bfa';cx.fillRect(x+1*s,y-2*s,2*s,2*s);cx.fillRect(x+0*s,y+0*s,3*s,3*s);break;
    case 'sports':cx.fillStyle='#4ade80';cx.fillRect(x-2*s,y-2*s,4*s,4*s);cx.fillStyle='#fff';cx.fillRect(x-1*s,y-3*s,2*s,1*s);cx.fillRect(x-1*s,y+2*s,2*s,1*s);cx.fillRect(x-3*s,y-1*s,1*s,2*s);cx.fillRect(x+2*s,y-1*s,1*s,2*s);break;
    case 'startup':cx.fillStyle='#f97316';cx.fillRect(x-2*s,y-3*s,4*s,2*s);cx.fillRect(x-1*s,y-1*s,2*s,3*s);cx.fillRect(x-3*s,y+2*s,6*s,1*s);break;
    case 'virtual':cx.fillStyle='#78ffd6';cx.fillRect(x,y+1*s,1*s,2*s);if(fr%24<12)cx.fillRect(x-2*s,y-1*s,5*s,1*s);if(fr%24<18)cx.fillRect(x-3*s,y-3*s,7*s,1*s);break;
    default:cx.fillRect(x-2*s,y-1*s,4*s,2*s);cx.fillRect(x-1*s,y-2*s,2*s,4*s);
  }
}

function dM(v){
  if(!vis(v))return;
  const x=(v.c||0)*TS+TS/2,y=(v.r||0)*TS+TS/2,cC=CC[v.cat]||'#fff',sC=SC[v.src]||cC;
  const bounce=Math.sin(fr*.05+v.id*1.3)*1.5;const yy=y+bounce;const sz=8;
  const g=cx.createRadialGradient(x,yy,0,x,yy,sz*2.5);g.addColorStop(0,sC+'40');g.addColorStop(1,sC+'00');cx.fillStyle=g;cx.fillRect(x-sz*2.5,yy-sz*2.5,sz*5,sz*5);
  cx.fillStyle='rgba(0,0,0,.3)';cx.fillRect(x-3,y+sz-1,6,2);
  cx.fillStyle=sC;cx.fillRect(x-4,yy-sz-2,8,sz+4);cx.fillStyle=sC+'88';cx.fillRect(x-3,yy-sz-1,6,sz+2);
  cx.fillStyle=cC;drawIcon(cx,x,yy-3,v.cat,sz);
  cx.fillStyle=sC;cx.fillRect(x-1,yy+sz-3,3,3);
  if(sel&&sel.id===v.id){cx.strokeStyle='#fff';cx.lineWidth=1.5;cx.setLineDash([3,2]);cx.beginPath();cx.arc(x,yy,sz+5,0,Math.PI*2);cx.stroke();cx.setLineDash([])}
}

function dNi(){cx.fillStyle='rgba(0,4,20,.35)';cx.fillRect(0,0,cv.width,cv.height)}

// ═══ PHASE 4: STREET VIEW ═══
function drawSV(v){
  const w=400,h=200,col=CC[v.cat]||'#fff';svX.clearRect(0,0,w,h);
  svX.fillStyle=nit?'#0a1424':'#88bbdd';svX.fillRect(0,0,w,80);
  svX.fillStyle=nit?'#1a1a10':'#c0a878';svX.fillRect(0,80,w,120);
  svX.fillStyle=nit?'#2a2218':'#9a8868';svX.fillRect(0,95,w,35);
  svX.fillStyle=nit?'rgba(255,220,60,.08)':'rgba(255,255,200,.25)';for(let x=10;x<w;x+=18)svX.fillRect(x,110,8,2);
  svX.fillStyle=nit?'#282818':'#d0c098';svX.fillRect(0,80,w,15);svX.fillRect(0,130,w,10);
  const nb=v.ev.length+2;
  for(let i=0;i<nb;i++){const bx=i*(w/nb)+4,bw=w/nb-8,bh=25+i*7+(v.cat==='tech'?12:0);
    svX.fillStyle=nit?'#1a1a2a':v.cat==='food'?['#d08850','#50a080','#c0a050'][i%3]:v.cat==='comedy'?['#a04060','#604080','#806040'][i%3]:['#6080a0','#c07850','#d08868'][i%3];
    svX.fillRect(bx,80-bh,bw,bh);svX.fillStyle=col+'66';svX.fillRect(bx,80-bh-3,bw,3);
    for(let wy=4;wy<bh-8;wy+=8)for(let wx=2;wx<bw-4;wx+=7){svX.fillStyle=nit?((H(wy,wx+i)%3>0)?'rgba(255,220,80,.6)':'rgba(10,15,30,.7)'):'rgba(180,220,255,.45)';svX.fillRect(bx+wx,80-bh+wy,4,3)}}
  // Mumbai taxi
  const ax=(fr*1.8)%w;svX.fillStyle='#111';svX.fillRect(ax,105,8,5);svX.fillStyle='#ffd700';svX.fillRect(ax+1,103,6,3);
  for(let p=0;p<6;p++){const px=30+p*60,py=134;svX.fillStyle=['#ffccaa','#c89060','#ffd8b0'][p%3];svX.fillRect(px,py,2,3);svX.fillStyle=['#4488cc','#cc4488','#88cc44'][p%3];svX.fillRect(px,py+3,2,4)}
  if(nit){for(let i=0;i<10;i++){svX.fillStyle=`rgba(255,255,220,${.3+Math.sin(fr*.05+i)*.2})`;svX.fillRect(H(i,0)%w,H(i,1)%50,1,1)}}
  svX.fillStyle='rgba(0,0,0,.5)';svX.fillRect(0,h-18,w,18);svX.fillStyle=col;svX.font='bold 7px monospace';svX.fillText(v.nm.split('\n')[0],5,h-7);
  document.getElementById('svl').textContent=`▸ ${v.nm.split('\n')[0].toUpperCase()}`;
  document.getElementById('svc').textContent=v.lat?`${v.lat.toFixed(3)}°N, ${v.lng.toFixed(3)}°E`:'';
}

// ═══ MINIMAP ═══
function drawMM(){
  mmX.fillStyle=nit?'#050a12':'#3080c0';mmX.fillRect(0,0,CO,RO);
  for(let r=0;r<RO;r++)for(let c=0;c<CO;c++){const t=MAP[r][c];if(t!==T.W){mmX.fillStyle=t===T.P?(nit?'#0a2006':'#3a8028'):t===T.M?(nit?'#302000':'#d4a830'):t===T.R?(nit?'#2a2218':'#c8a87a'):(nit?'#1a1008':'#b08060');mmX.fillRect(c,r,1,1)}}
  V.forEach(v=>{if(!vis(v))return;mmX.fillStyle=CC[v.cat]||'#fff';mmX.fillRect(v.c||0,v.r||0,2,2)});
}

// ═══ RENDER ═══
function render(){
  fr++;cx.fillStyle=nit?'#030810':(rain?'#607888':'#3080c0');cx.fillRect(0,0,cv.width,cv.height);
  for(let r=0;r<RO;r++)for(let c=0;c<CO;c++)drawTile(r,c,MAP[r][c]);
  dL();drawAutos();drawMetro();drawLandmarks();
  if(nit)dNi();drawBirds();drawRain();updParticles();
  V.forEach(v=>dM(v));if(sel)drawSV(sel);
  if(fr%10===0)drawMM();
  requestAnimationFrame(render);
}

// ═══ INTERACTIONS ═══
cv.addEventListener('click',e=>{if(dragging)return;const rc=cv.getBoundingClientRect(),sx=cv.width/rc.width,sy=cv.height/rc.height,mx=(e.clientX-rc.left)*sx,my=(e.clientY-rc.top)*sy;
  let hit=null;V.forEach(v=>{if(!vis(v))return;const vx=(v.c||0)*TS+TS/2,vy=(v.r||0)*TS+TS/2;if(Math.hypot(mx-vx,my-vy)<16)hit=v});
  if(hit){sel=hit;openP(hit);panTo((hit.c||0)*TS,(hit.r||0)*TS)}else{sel=null;closeP()}});
cv.addEventListener('mousemove',e=>{const rc=cv.getBoundingClientRect(),sx=cv.width/rc.width,sy=cv.height/rc.height,mx=(e.clientX-rc.left)*sx,my=(e.clientY-rc.top)*sy;
  const tt=document.getElementById('tt');let hov=null;V.forEach(v=>{if(!vis(v))return;const vx=(v.c||0)*TS+TS/2,vy=(v.r||0)*TS+TS/2;if(Math.hypot(mx-vx,my-vy)<16)hov=v});
  if(hov){cv.style.cursor='pointer';tt.innerHTML=`<b style="color:${CC[hov.cat]}">${hov.nm.replace('\n','<br>')}</b><br><span style="color:${SC[hov.src]};font-size:4px">${SN[hov.src]}</span><br><span style="color:#5a7a9a">${hov.ev.length} events</span>`;const cr=ma.getBoundingClientRect();tt.style.left=(e.clientX-cr.left+10)+'px';tt.style.top=(e.clientY-cr.top-8)+'px';tt.style.display='block'}else{cv.style.cursor='grab';tt.style.display='none'}});

function openP(v){
  const cC=CC[v.cat]||'#fff',sC=SC[v.src]||'#aaa';
  let h=`<div class="vn">${v.nm.replace('\n','<br>')}</div><div class="vsrc"><span style="color:${sC};border:1px solid ${sC}33;padding:1px 3px;font-size:4px">${SN[v.src]}</span> · ${v.ev.length} events${v.lat?` · ${v.lat.toFixed(3)}°N`:''}</div>`;
  if(v.vibe)h+=`<div class="vb" style="border-color:${cC}44;color:${cC}88">${v.vibe}</div>`;
  v.ev.forEach(e=>{const tags=(e.tg||[]).map(t=>`<span style="color:${cC};border-color:${cC}33">${t}</span>`).join('');
    const bd=e.s==='x'?`<span class="st st-s">SOLD OUT</span>`:e.p==='Free'||e.p==='Free entry'?`<span class="st st-f">FREE</span>`:'';
    let ab='';if(e.a){ab=`<div style="font-size:4px;color:#3a5a7a;margin-top:2px">${e.a.toLocaleString()}+ interested</div>`}
    h+=`<div class="ec"><div class="et" style="color:${cC}">${e.t}</div><div class="eby">${e.by||''}</div><div class="em">📅 ${e.d} · 🎟 ${e.p}</div>${bd}${ab}<div class="tgs">${tags}</div></div>`});
  document.getElementById('rpc').innerHTML=h;document.getElementById('rp').classList.remove('closed');
}
function closeP(){document.getElementById('rp').classList.add('closed');sel=null}

function toggleAll(){const ae=document.getElementById('ae');if(ae.classList.contains('show')){ae.classList.remove('show');return}ae.classList.add('show');
  const allEv=[];V.forEach(v=>{if(!vis(v))return;v.ev.forEach(e=>allEv.push({...e,vnm:v.nm.split('\n')[0],cat:v.cat,src:v.src}))});
  document.getElementById('aeh').textContent=`ALL MUMBAI EVENTS — ${allEv.length} events · ${V.filter(v=>vis(v)).length} venues`;
  document.getElementById('aeg').innerHTML=allEv.map(e=>{const cC=CC[e.cat]||'#fff',sC=SC[e.src]||'#aaa';const bd=e.s==='x'?`<span class="st st-s">SOLD OUT</span>`:e.p==='Free'?`<span class="st st-f">FREE</span>`:'';
    return`<div class="ac"><span style="font-size:4px;color:${sC};border:1px solid ${sC}33;padding:1px 2px">${SN[e.src]}</span><div style="font-size:6px;color:${cC};margin:3px 0;line-height:1.5">${e.t}</div><div style="font-size:5px;color:var(--dim)">📅 ${e.d} · 🎟 ${e.p} ${bd}</div><div style="font-size:4px;color:#5a7a9a">📍 ${e.vnm}</div></div>`}).join('')}

function sF(f,b){flt=f;document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));b.classList.add('on');closeP()}
function togD(){nit=!nit;document.getElementById('db').textContent=nit?'☾ NIGHT':'☀ DAY'}
function togR(){rain=!rain;document.getElementById('rb').textContent=rain?'☂ STOP':'☂ RAIN';document.getElementById('rb').style.background=rain?'rgba(100,160,230,.15)':'none'}

setInterval(()=>{tM=(tM+1)%(24*60);const h2=Math.floor(tM/60),mn=tM%60;document.getElementById('ck').textContent=`${((h2%12)||12).toString().padStart(2,'0')}:${mn.toString().padStart(2,'0')} ${h2>=12?'PM':'AM'}`;const ni=tM<6*60||tM>=19*60;if(ni!==nit){nit=ni;document.getElementById('db').textContent=nit?'☾ NIGHT':'☀ DAY'}},200);

applyTx();render();
</script>
</body>
